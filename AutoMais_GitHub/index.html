.cl-box{width:17px;height:17px;border:2px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cl-box.ck{background:var(--accent);border-color:var(--accent);color:#000;font-size:11px}
.cl-sec{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
@media(max-width:900px){.sg{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}
@media(max-width:640px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.sg{grid-template-columns:1fr 1fr}.fr{grid-template-columns:1fr}.mbtn{display:flex}}
@media print{.sidebar,.btn,.sb2,.mbtn,.ov,.nsec{display:none!important}.main{margin-left:0;padding:0}body{background:#fff;color:#000}}</style>

    '<div class="av" style="background:var(--adim);color:var(--accent)">&#128664;</div>'+

    '<div style="font-size:11px;color:var(--t3)">'+v.placa+' &bull; '+v.ano+' &bull; '+Number(v.km||0).toLocaleString('pt-BR')+' km</div></div></div>'+
    '<div style="text-align:right"><div style="font-weight:800;font-size:13px;color:var(--accent)">R$ '+brl(v.preco)+'</div>'+sbV(v.status)+'</div></div>'
  ).join('')+'</div>'+
  '<div style="display:flex;flex-direction:column;gap:14px">'+
  '<div class="card"><div class="shd">Resumo Financeiro</div>'+
  [['Valor em estoque','R$ '+brl(est),'var(--accent)'],['Custo manutencoes','R$ '+brl(manutT),'var(--warn)'],['Total de contratos',DB.contratos.length,'var(--text)'],['Fornecedores / Consign.',DB.fornecedores.length,'var(--t2)']].map(r=>
    '<div class="sr2"><span style="font-size:13px;color:var(--t2)">'+r[0]+'</span><span style="font-weight:800;font-size:13px;color:'+r[2]+'">'+r[1]+'</span></div>'
  ).join('')+'</div>'+
  '<div class="card"><div class="shd">Ultimas Vendas</div>'+
  (DB.vendas.length?DB.vendas.slice(-5).reverse().map(v=>
    '<div class="sr2"><div><div style="font-size:12px;font-weight:700">'+vNome(v.veiculo_id)+'</div>'+
    '<div style="font-size:11px;color:var(--t3)">'+cNome(v.cliente_id)+' &bull; '+fd(v.data)+'</div></div>'+
    '<span style="color:var(--ok);font-weight:800;font-size:13px">R$ '+brl(v.valor)+'</span></div>'
  ).join(''):'<div class="empty"><span class="ei">&#128176;</span>Nenhuma venda</div>')+
  '</div>'+
  '<div class="card"><div class="shd">Acesso Rapido</div>'+
  '<div style="display:flex;flex-direction:column;gap:8px">'+
  '<a class="btn bp" href="vendas.html" style="justify-content:center">&#128176; Nova Venda</a>'+
  '<a class="btn bg2" href="veiculos.html" style="justify-content:center">&#128664; Cadastrar Veiculo</a>'+
  '<a class="btn bg2" href="cadastros.html" style="justify-content:center">&#128101; Novo Cliente</a>'+
  '</div></div>'+
  '</div></div>';
})();

</script></body></html>
