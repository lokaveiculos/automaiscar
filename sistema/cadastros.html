<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto Mais - Cadastros</title><style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1c1d28;--sb:#13141e;--card:#22233a;--card2:#2a2b42;--border:#32344a;--border2:#3d3f58;--accent:#f5a623;--ah:#f7b84b;--adim:rgba(245,166,35,.13);--adim2:rgba(245,166,35,.06);--text:#eef0f8;--t2:#8890a8;--t3:#50546a;--ok:#22c55e;--err:#ef4444;--info:#3b82f6;--warn:#f59e0b;--r:8px;--rsm:5px;--rlg:12px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.main{margin-left:210px;flex:1;padding:28px;min-height:100vh}
.logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo-inner{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-name{font-size:14.5px;font-weight:900;color:var(--text)}
.logo-tag{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px}
.nav{flex:1;padding:8px 7px;overflow-y:auto}
.nsec{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;padding:13px 8px 4px;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rsm);cursor:pointer;font-size:12.5px;color:var(--t2);transition:all .12s;margin-bottom:1px;user-select:none;text-decoration:none}
.ni:hover{background:var(--adim2);color:var(--text)}
.ni.active{background:var(--adim);color:var(--accent);font-weight:700}
.sf{padding:12px 14px;border-top:1px solid var(--border)}
.sf-lbl{font-size:10px;color:var(--t3)}
.sf-name{font-size:12px;font-weight:700;color:var(--text);margin-top:2px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.pt{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.5px}
.ps{font-size:12px;color:var(--t3);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--rsm);border:none;cursor:pointer;font-size:12.5px;font-weight:700;transition:all .12s;white-space:nowrap;text-decoration:none}
.bp{background:var(--accent);color:#000}.bp:hover{background:var(--ah)}
.bg2{background:transparent;color:var(--t2);border:1px solid var(--border2)}.bg2:hover{background:var(--card2);color:var(--text)}
.bsm{padding:5px 10px;font-size:11.5px}
.bd{background:rgba(239,68,68,.1);color:var(--err);border:1px solid rgba(239,68,68,.2)}.bd:hover{background:rgba(239,68,68,.2)}
.bs{background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.bi{background:rgba(59,130,246,.1);color:var(--info);border:1px solid rgba(59,130,246,.2)}
.bw{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.shd{font-size:9.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.si{font-size:20px;margin-bottom:8px}.sl{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.sv{font-size:26px;font-weight:900;margin-top:4px}
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:480px}
th{background:var(--card2);font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);padding:11px 16px;text-align:left;font-weight:800;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 16px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--adim2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.bg-g{background:rgba(34,197,94,.1);color:var(--ok)}.bg-y{background:rgba(245,158,11,.1);color:var(--warn)}.bg-r{background:rgba(239,68,68,.1);color:var(--err)}.bg-b{background:rgba(59,130,246,.1);color:var(--info)}.bg-gr{background:rgba(255,255,255,.04);color:var(--t2)}.bg-o{background:var(--adim);color:var(--accent)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}.fg.full{grid-column:1/-1}
label{font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{background:#0a0a0a;border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 11px;font-size:13px;color:var(--text);outline:none;transition:border .12s;width:100%;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--adim)}
select option{background:#111}
textarea{resize:vertical;min-height:70px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.md{background:var(--card);border:1px solid var(--border2);border-radius:var(--rlg);padding:26px;width:100%;max-width:700px;max-height:92vh;overflow-y:auto}
.md-lg{max-width:900px}
.mt2{font-size:16px;font-weight:900;margin-bottom:18px;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.mf{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.sb2{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sw{flex:1;position:relative;min-width:180px}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.sw input{padding-left:30px}
.acts{display:flex;gap:5px}
.empty{text-align:center;padding:48px;color:var(--t3)}
.ei{font-size:30px;display:block;margin-bottom:10px;opacity:.35}
.av{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.ct{background:#050505;border:1px solid var(--border);border-radius:var(--r);padding:18px;font-size:11.5px;line-height:1.95;color:#bbb;white-space:pre-wrap;font-family:'Courier New',monospace;max-height:420px;overflow-y:auto}
.ib{background:var(--adim2);border:1px solid rgba(249,115,22,.15);border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:var(--t2);margin-bottom:12px}
.g2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
.sr2{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.sr2:last-child{border-bottom:none}
.di{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.di:last-child{border-bottom:none}
.hidden{display:none}
.mbtn{display:none;position:fixed;top:14px;left:14px;z-index:200;width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);cursor:pointer;align-items:center;justify-content:center;font-size:16px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.ov.show{display:block}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.placa-wrap{display:flex;flex-wrap:wrap;gap:20px;padding:8px 0}
.placa{background:#fff;color:#000;border-radius:10px;overflow:hidden;width:310px;border:2px solid #111;page-break-inside:avoid}
.pph{background:#000;color:#f97316;padding:10px 16px;text-align:center}
.plogo{font-size:18px;font-weight:900;letter-spacing:1px}
.psub2{font-size:8px;letter-spacing:3px;color:#555;margin-top:1px;text-transform:uppercase}
.pb{padding:14px 16px}
.pm{font-size:21px;font-weight:900;color:#000;line-height:1.1}
.pa{font-size:12px;color:#555;margin-top:2px}
.pp-lbl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:10px}
.pp{font-size:32px;font-weight:900;color:#f97316;line-height:1}
.pinfos{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:10px 0}
.pinfo{background:#f5f5f5;border-radius:4px;padding:5px 8px}
.pil{font-size:8px;color:#888;text-transform:uppercase;font-weight:700}
.piv{font-size:12px;font-weight:800;color:#000}
.pfoot{background:#000;color:#fff;padding:8px 16px;text-align:center}
.ptel{font-size:13px;font-weight:900;color:#f97316}
.pftel{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px}
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-box{width:17px;height:17px;border:2px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cl-box.ck{background:var(--accent);border-color:var(--accent);color:#000;font-size:11px}
.cl-sec{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
@media(max-width:900px){.sg{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}

/* ── Overflow prevention ─────────────────────────── */
html{overflow-x:hidden}
body{overflow-x:hidden;max-width:100vw}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{min-width:560px}

@media(max-width:900px){.sg{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}

@media(max-width:640px){
  html,body{overflow-x:hidden}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  /* Main — espaço para o hamburguer no topo */
  .main{margin-left:0;padding:16px;padding-top:64px}
  /* Stats grid 2 colunas */
  .sg{grid-template-columns:1fr 1fr!important}
  /* Formulários colapsam para 1 coluna */
  .fr{grid-template-columns:1fr}
  .fr .fg.full{grid-column:1}
  /* Hamburguer visível */
  .mbtn{display:flex}
  /* Modal — sobe da base no mobile */
  .mo{padding:0;align-items:flex-end}
  .md{max-height:92vh;border-radius:12px 12px 0 0;padding:18px;width:100%;max-width:100%}
  /* Page header empilha verticalmente */
  .ph{flex-direction:column;align-items:stretch}
  .ph>div:last-child,.ph>div:first-child+div{
    display:flex;flex-wrap:wrap;gap:8px
  }
  /* Tabs com scroll horizontal */
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;padding-bottom:2px}
  .tab{white-space:nowrap;flex-shrink:0}
  /* Botões de ação nas tabelas */
  .acts{flex-wrap:wrap;gap:4px}
  /* Cards */
  .card{padding:14px}
  /* Inputs full-width no modal */
  .md input,.md select,.md textarea{font-size:16px}
}

@media(max-width:400px){
  .main{padding:12px;padding-top:60px}
  .sg{grid-template-columns:1fr 1fr}
  .sc .sv{font-size:20px}
  table{min-width:500px}
}
@media print{.sidebar,.btn,.sb2,.mbtn,.ov,.nsec{display:none!important}.main{margin-left:0;padding:0}body{background:#fff;color:#000}}</style>

function sbM(s){const m={concluida:'bg-g',andamento:'bg-y',pendente:'bg-gr'};return'<span class="badge '+(m[s]||'bg-gr')+'">'+s+'</span>';}
function om(h,lg){const md=document.getElementById('mdc');md.className='md'+(lg?' md-lg':'');md.innerHTML=h;document.getElementById('modal').classList.remove('hidden');}
function cm(){document.getElementById('modal').classList.add('hidden');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)cm();});
function tsb(){document.getElementById('sb').classList.toggle('open');document.getElementById('ov').classList.toggle('show');}
function csb(){document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show');}
function impWin(txt){const w=window.open('','_blank');w.document.write('<!DOCTYPE html><html><head><meta charset=UTF-8><style>body{font-family:Courier New,monospace;font-size:12px;padding:28px;line-height:1.8;color:#000;white-space:pre-wrap}</style></head><body>'+txt+'</body></html>');w.document.close();w.print();}


let cadTab='clientes', cSrch='', fSrch='', cPag=1, fPag=1;
checkAuth(function(){
  applyProfile();showLoading('Carregando cadastros...');
  loadFromFirestore().then(function(){
    if(window.location.hash==='#forn') cadTab='forn';
    renderTab();
  });
});

function renderTab(){ cadTab==='forn'?renderForn():renderCli(); }

function renderCli(){
  const fl=DB.clientes.filter(c=>{const m=cSrch.toLowerCase();return !m||c.nome.toLowerCase().includes(m)||c.cpf.includes(m)||c.telefone.includes(m);});
  const cols=['rgba(249,115,22,.15)','rgba(34,197,94,.12)','rgba(59,130,246,.12)','rgba(245,158,11,.12)'];
  const tc=['var(--accent)','var(--ok)','var(--info)','var(--warn)'];
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><div class="pt">Cadastros</div><div class="ps">Clientes e Fornecedores</div></div>'+
  '<button class="btn bp" onclick="fmCli(null)">+ Novo Cliente</button></div>'+
  '<div class="tabs">'+
  '<div class="tab active">&#128101; Clientes ('+DB.clientes.length+')</div>'+
  '<div class="tab" onclick="cadTab=\'forn\';renderForn()">&#127970; Fornecedores ('+DB.fornecedores.length+')</div></div>'+
  '<div class="sb2"><div class="sw"><span class="sico">&#128269;</span><input value="'+cSrch+'" oninput="cSrch=this.value;cPag=1;renderCli()" placeholder="Nome, CPF ou telefone..."></div></div>'+
  '<div class="tw"><table><thead><tr><th>Cliente</th><th>CPF</th><th>Telefone</th><th>Cidade/UF</th><th>Acoes</th></tr></thead><tbody>'+
  (fl.length===0?'<tr><td colspan="5"><div class="empty"><span class="ei">&#128101;</span>Nenhum cliente</div></td></tr>':'')+
  fl.map((c,i)=>
    '<tr><td><div style="display:flex;align-items:center;gap:10px">'+
    '<div class="av" style="background:'+cols[i%4]+';color:'+tc[i%4]+'">'+ini(c.nome)+'</div>'+
    '<div><div style="font-weight:700">'+c.nome+'</div><div style="font-size:11px;color:var(--t3)">'+(c.email||'-')+'</div></div></div></td>'+
    '<td style="font-family:monospace">'+c.cpf+'</td><td>'+c.telefone+'</td>'+
    '<td style="font-size:12px;color:var(--t3)">'+(c.cidade||'-')+(c.uf?' / '+c.uf:'')+'</td>'+
    '<td><div class="acts"><button class="btn bg2 bsm" onclick="fmCli('+c.id+')">&#9999;</button>'+(isAdmin()?'<button class="btn bd bsm" onclick="dlCli('+c.id+')">&#128465;</button>':'')+' </div></td></tr>'
  ).join('')+
  '</tbody></table>'+pagC+'</div>';
}

function fmCli(id){
  const c=id?DB.clientes.find(x=>x.id==id):{nome:'',cpf:'',rg:'',nasc:'',estado_civil:'',profissao:'',telefone:'',email:'',endereco:'',cidade:'',uf:'BA',cep:'',obs:''};
  om('<div class="mt2"><span>'+(id?'Editar':'Novo Cliente')+'</span><button class="btn bg2 bsm" onclick="cm()">X</button></div>'+
  '<div class="fr"><div class="fg full"><label>Nome Completo *</label><input id="cn" value="'+c.nome+'"></div></div>'+
  '<div class="fr"><div class="fg"><label>CPF *</label><input id="ccpf" value="'+c.cpf+'" placeholder="000.000.000-00" oninput="this.value=maskCPF(this.value)"></div>'+
  '<div class="fg"><label>RG</label><input id="crg" value="'+(c.rg||'')+'"></div></div>'+
  '<div class="fr"><div class="fg"><label>Nascimento</label><input id="cnasc" type="date" value="'+(c.nasc||'')+'"></div>'+
  '<div class="fg"><label>Estado Civil</label><select id="cec">'+['','Solteiro(a)','Casado(a)','Divorciado(a)','Viuvo(a)','Uniao Estavel'].map(x=>'<option '+(c.estado_civil===x?'selected':'')+'>'+x+'</option>').join('')+'</select></div></div>'+
  '<div class="fr"><div class="fg"><label>Profissao</label><input id="cprof" value="'+(c.profissao||'')+'"></div>'+
  '<div class="fg"><label>Telefone *</label><input id="ctel" value="'+c.telefone+'" placeholder="(71) 99999-0000" oninput="this.value=maskPhone(this.value)"></div></div>'+
  '<div class="fr"><div class="fg"><label>Email</label><input id="cemail" value="'+c.email+'" type="email"></div>'+
  '<div class="fg"><label>CEP</label><input id="ccep" value="'+(c.cep||'')+'" oninput="this.value=maskCEP(this.value)"></div></div>'+
  '<div class="fr"><div class="fg full"><label>Endereco</label><input id="cend" value="'+c.endereco+'"></div></div>'+
  '<div class="fr"><div class="fg"><label>Cidade</label><input id="ccid" value="'+(c.cidade||'')+'"></div>'+
  '<div class="fg"><label>UF</label><input id="cuf" value="'+(c.uf||'BA')+'" maxlength="2" style="text-transform:uppercase"></div></div>'+
  '<div class="fr"><div class="fg full"><label>Observacoes</label><textarea id="cobs">'+(c.obs||'')+'</textarea></div></div>'+
  '<div class="mf"><button class="btn bg2" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svCli('+(id||'null')+')">Salvar</button></div>');
}
function svCli(id){
  const nome=document.getElementById('cn').value.trim(),cpf=document.getElementById('ccpf').value.trim(),tel=document.getElementById('ctel').value.trim();
  if(!nome||!cpf||!tel){toast('Preencha Nome, CPF e Telefone','err');return;}
  const obj={id:id||nid(DB.clientes),nome,cpf,rg:document.getElementById('crg').value,nasc:document.getElementById('cnasc').value,estado_civil:document.getElementById('cec').value,profissao:document.getElementById('cprof').value,telefone:tel,email:document.getElementById('cemail').value,cep:document.getElementById('ccep').value,endereco:document.getElementById('cend').value,cidade:document.getElementById('ccid').value,uf:document.getElementById('cuf').value.toUpperCase(),obs:document.getElementById('cobs').value};
  var dupCPF=DB.clientes.find(function(c){return c.cpf===cpf&&c.id!=id;});
  if(dupCPF&&!confirm('Ja existe um cliente com o CPF '+cpf+'. Deseja continuar mesmo assim?')) return;
  if(id)DB.clientes=DB.clientes.map(c=>c.id==id?obj:c);else DB.clientes.push(obj);
  sDB();fsave("clientes",obj);cm();renderCli();
  toast(id?'Cliente atualizado':'Cliente cadastrado com sucesso','ok');
}
function dlCli(id){
  var cts = DB.contratos.filter(function(c){return c.cliente_id==id;});
  var vds = DB.vendas.filter(function(v){return v.cliente_id==id;});
  var msg = 'Tem certeza que deseja excluir este cliente?';
  if(cts.length||vds.length){
    msg = 'Este cliente possui registros vinculados:
';
    if(cts.length) msg += '- '+cts.length+' contrato(s)
';
    if(vds.length) msg += '- '+vds.length+' venda(s)
';
    msg += '
Os contratos/vendas ficaram sem cliente. Deseja continuar?';
  }
  if(!confirm(msg)) return;
  DB.clientes = DB.clientes.filter(function(c){return c.id!=id;});
  fdel('clientes',id);
  sDB(); renderCli();
  toast('Cliente excluido com sucesso','ok');
}}

function renderForn(){
  const fl=DB.fornecedores.filter(f=>{const m=fSrch.toLowerCase();return !m||f.nome.toLowerCase().includes(m)||f.cpf.includes(m);});
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><div class="pt">Cadastros</div><div class="ps">Clientes e Fornecedores</div></div>'+
  '<button class="btn bp" onclick="fmForn(null)">+ Novo Fornecedor</button></div>'+
  '<div class="tabs">'+
  '<div class="tab" onclick="cadTab=\'clientes\';renderCli()">&#128101; Clientes ('+DB.clientes.length+')</div>'+
  '<div class="tab active">&#127970; Fornecedores ('+DB.fornecedores.length+')</div></div>'+
  '<div class="sb2"><div class="sw"><span class="sico">&#128269;</span><input value="'+fSrch+'" oninput="fSrch=this.value;fPag=1;renderForn()" placeholder="Nome ou CPF/CNPJ..."></div></div>'+
  '<div class="tw"><table><thead><tr><th>Fornecedor</th><th>CPF/CNPJ</th><th>Telefone</th><th>Tipo</th><th>Veiculos</th><th>Acoes</th></tr></thead><tbody>'+
  (fl.length===0?'<tr><td colspan="6"><div class="empty"><span class="ei">&#127970;</span>Nenhum fornecedor</div></td></tr>':'')+
  fl.map(f=>{
    const veics=DB.veiculos.filter(v=>v.proprietario_id==f.id);
    return '<tr><td><div style="font-weight:700">'+f.nome+'</div><div style="font-size:11px;color:var(--t3)">'+(f.email||'-')+'</div></td>'+
    '<td style="font-family:monospace">'+f.cpf+'</td><td>'+f.telefone+'</td>'+
    '<td><span class="badge '+(f.tipo==='pessoa_juridica'?'bg-b':'bg-gr')+'">'+(f.tipo==='pessoa_juridica'?'PJ':'PF')+'</span></td>'+
    '<td>'+(veics.length?veics.map(v=>'<span class="badge bg-o" style="margin:1px">'+v.placa+'</span>').join(''):'-')+'</td>'+
    '<td><div class="acts"><button class="btn bg2 bsm" onclick="fmForn('+f.id+')">&#9999;</button><button class="btn bd bsm" onclick="dlForn('+f.id+')">&#128465;</button></div></td></tr>';
  }).join('')+
  '</tbody></table>'+pagF+'</div>';
}
function fmForn(id){
  const f=id?DB.fornecedores.find(x=>x.id==id):{nome:'',cpf:'',rg:'',telefone:'',email:'',endereco:'',cidade:'',uf:'BA',cep:'',tipo:'pessoa_fisica',banco:'',agencia:'',conta:'',obs:''};
  om('<div class="mt2"><span>'+(id?'Editar':'Novo Fornecedor / Consignante')+'</span><button class="btn bg2 bsm" onclick="cm()">X</button></div>'+
  '<div class="fr"><div class="fg"><label>Tipo</label><select id="ftp"><option value="pessoa_fisica" '+(f.tipo==='pessoa_fisica'?'selected':'')+'>Pessoa Fisica</option><option value="pessoa_juridica" '+(f.tipo==='pessoa_juridica'?'selected':'')+'>Pessoa Juridica</option></select></div>'+
  '<div class="fg"><label>Nome / Razao Social *</label><input id="fn" value="'+f.nome+'"></div></div>'+
  '<div class="fr"><div class="fg"><label>CPF / CNPJ *</label><input id="fcpf" value="'+f.cpf+'" placeholder="000.000.000-00" oninput="this.value=maskCPFCNPJ(this.value)"></div>'+
  '<div class="fg"><label>RG / IE</label><input id="frg" value="'+(f.rg||'')+'"></div></div>'+
  '<div class="fr"><div class="fg"><label>Telefone *</label><input id="ftel" value="'+f.telefone+'" oninput="this.value=maskPhone(this.value)"></div>'+
  '<div class="fg"><label>Email</label><input id="femail" value="'+f.email+'" type="email"></div></div>'+
  '<div class="fr"><div class="fg full"><label>Endereco</label><input id="fend" value="'+f.endereco+'"></div></div>'+
  '<div class="fr"><div class="fg"><label>Cidade</label><input id="fcid" value="'+(f.cidade||'')+'"></div>'+
  '<div class="fg"><label>UF</label><input id="fuf" value="'+(f.uf||'BA')+'" maxlength="2" style="text-transform:uppercase"></div></div>'+
  '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:10px 0 6px">Dados Bancarios (para repasse)</div>'+
  '<div class="fr"><div class="fg"><label>Banco</label><input id="fbco" value="'+(f.banco||'')+'"></div>'+
  '<div class="fg"><label>Agencia</label><input id="fag" value="'+(f.agencia||'')+'"></div></div>'+
  '<div class="fr"><div class="fg"><label>Conta</label><input id="fcc" value="'+(f.conta||'')+'"></div>'+
  '<div class="fg"><label>Tipo</label><select id="ftcc"><option>Corrente</option><option>Poupanca</option></select></div></div>'+
  '<div class="fr"><div class="fg full"><label>Observacoes</label><textarea id="fobs">'+(f.obs||'')+'</textarea></div></div>'+
  '<div class="mf"><button class="btn bg2" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svForn('+(id||'null')+')">Salvar</button></div>');
}
function svForn(id){
  const nome=document.getElementById('fn').value.trim(),cpf=document.getElementById('fcpf').value.trim(),tel=document.getElementById('ftel').value.trim();
  if(!nome||!cpf||!tel){toast('Preencha Nome, CPF e Telefone','err');return;}
  const obj={id:id||nid(DB.fornecedores),nome,cpf,rg:document.getElementById('frg').value,telefone:tel,email:document.getElementById('femail').value,endereco:document.getElementById('fend').value,cidade:document.getElementById('fcid').value,uf:document.getElementById('fuf').value.toUpperCase(),tipo:document.getElementById('ftp').value,banco:document.getElementById('fbco').value,agencia:document.getElementById('fag').value,conta:document.getElementById('fcc').value,obs:document.getElementById('fobs').value};
  if(id)DB.fornecedores=DB.fornecedores.map(f=>f.id==id?obj:f);else DB.fornecedores.push(obj);
  sDB();fsave("fornecedores",obj);cm();renderForn();
  toast(id?'Fornecedor atualizado':'Fornecedor cadastrado com sucesso','ok');
}
function dlForn(id){
  var veics = DB.veiculos.filter(function(v){return v.proprietario_id==id;});
  var cts   = DB.contratos.filter(function(c){return c.fornecedor_id==id;});
  var msg   = 'Tem certeza que deseja excluir este fornecedor?';
  if(veics.length||cts.length){
    msg = 'Este fornecedor possui registros vinculados:
';
    if(veics.length) msg += '- '+veics.length+' veiculo(s) consignado(s)
';
    if(cts.length)   msg += '- '+cts.length+' contrato(s)
';
    msg += '
Deseja continuar? Os vinculos serao mantidos.';
  }
  if(!confirm(msg)) return;
  DB.fornecedores = DB.fornecedores.filter(function(f){return f.id!=id;});
  fdel('fornecedores',id);
  sDB(); renderForn();
  toast('Fornecedor excluido com sucesso','ok');
}}
