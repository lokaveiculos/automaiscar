// ── Theme toggle ─────────────────────────────────────────────
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'light';
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('am_theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  var icon  = document.getElementById('theme-icon');
  var label = document.getElementById('theme-label');
  if(icon)  icon.setAttribute('data-lucide', theme === 'dark' ? 'moon' : 'sun');
  if(label) label.textContent = theme === 'dark' ? 'Tema Escuro' : 'Aparência';
  if(typeof lucide !== 'undefined') lucide.createIcons();
}
(function(){
  var saved = localStorage.getItem('am_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  // Apply after DOM ready
  document.addEventListener('DOMContentLoaded', function(){ updateThemeBtn(saved); });
})();

// ── Sidebar mobile ────────────────────────────────────────────
function tsb() {
  var sb = document.getElementById('sb');
  var ov = document.getElementById('sb-overlay');
  if(!sb) return;
  sb.classList.toggle('open');
  if(ov) ov.classList.toggle('open');
}
function csb() {
  var sb = document.getElementById('sb');
  var ov = document.getElementById('sb-overlay');
  if(sb) sb.classList.remove('open');
  if(ov) ov.classList.remove('open');
}

// ── Lucide init + reinit helper ───────────────────────────────
function renderIcons() {
  if(typeof lucide !== 'undefined') {
    try { lucide.createIcons(); } catch(e) {}
  }
}

// ── Avatar initials ───────────────────────────────────────────
function setAvatar(name) {
  var el = document.getElementById('avatar-initials');
  if(el && name) el.textContent = name.charAt(0).toUpperCase();
}

// ── Admin nav ─────────────────────────────────────────────────
function applyProfile() {
  if(!isAdmin()) {
    document.querySelectorAll('[data-admin-only]').forEach(function(el){
      el.style.display = 'none';
    });
  }
}


// ── Toast (design system) ─────────────────────────────────────
(function(){
  var stack = document.createElement('div');
  stack.className = 'toast-stack';
  document.body.appendChild(stack);
  
  window.toast = function(msg, type, dur) {
    type = type || 'ok';
    dur  = dur  || 3000;
    var icons = {ok:'check',err:'x-circle',warn:'alert-triangle',info:'info'};
    var el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.innerHTML = '<i data-lucide="' + (icons[type]||'check') + '"></i><span>' + msg + '</span>';
    stack.appendChild(el);
    if(typeof lucide !== 'undefined') lucide.createIcons({nodes:[el]});
    setTimeout(function(){
      el.style.animation = 'toastOut 300ms ease forwards';
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, dur);
  };
})();

  '</select></div></div>'+

function svVeic(id){
  const placa=document.getElementById('vp').value.trim(),marca=document.getElementById('vmarca').value.trim(),modelo=document.getElementById('vmod').value.trim(),preco=document.getElementById('vpreco').value;
  if(!placa||!marca||!modelo||!preco){toast('Preencha: Placa, Marca, Modelo e Preco','err');return;}
  var dupPlaca=DB.veiculos.find(function(v){return v.placa===placa&&v.id!=id;});
  if(dupPlaca){toast('Ja existe um veiculo com a placa '+placa,'err');return;}
  const te=document.getElementById('vtipo').value;
  const obj={id:id||nid(DB.veiculos),placa,marca,modelo,
    versao:document.getElementById('vver').value,
    ano:document.getElementById('vano').value,
    cor:document.getElementById('vcor').value,
    km:document.getElementById('vkm').value,
    preco,
    valor_compra:document.getElementById('vcusto').value,
    data_entrada:document.getElementById('vdentrada').value,
    cambio:document.getElementById('vcambio').value,
    portas:document.getElementById('vportas').value,
    fipe:document.getElementById('vfipe').value,
    status:document.getElementById('vs').value,
    tipo_est:te,
    proprietario_id:te==='consignado'?Number(document.getElementById('vforn').value)||'':'',
    chassi:document.getElementById('vchassi').value,
    renavam:document.getElementById('vren').value,
    combustivel:document.getElementById('vcomb').value,
    opcionais:document.getElementById('vops').value,
    obs:document.getElementById('vobs').value};
  if(id)DB.veiculos=DB.veiculos.map(v=>v.id==id?obj:v);else DB.veiculos.push(obj);
  sDB();fsave("veiculos",obj);cm();renderVeic();
}
function dlVeic(id){
  var cts  = DB.contratos.filter(function(c){return c.veiculo_id==id;});
  var vds  = DB.vendas.filter(function(v){return v.veiculo_id==id;});
  var mts  = DB.manutencoes.filter(function(m){return m.veiculo_id==id;});
  var vRef = DB.veiculos.find(function(x){return x.id==id;})||{};
  var dps  = (DB.despesas||[]).filter(function(d){return d.placa===vRef.placa;});
  var total= cts.length+vds.length+mts.length+dps.length;
  var linhas=['Tem certeza que deseja excluir este veiculo?'];
  if(total>0){
    linhas=['Este veiculo possui registros vinculados:'];
    if(cts.length) linhas.push('- '+cts.length+' contrato(s)');
    if(vds.length) linhas.push('- '+vds.length+' venda(s)');
    if(mts.length) linhas.push('- '+mts.length+' manutencao(oes)');
    if(dps.length) linhas.push('- '+dps.length+' despesa(s)');
    linhas.push('Todos serao excluidos. Deseja continuar?');
  }
  if(!confirm(linhas.join('\n'))) return;
  DB.veiculos=DB.veiculos.filter(function(v){return v.id!=id;});
  DB.contratos=DB.contratos.filter(function(c){return c.veiculo_id!=id;});
  DB.vendas=DB.vendas.filter(function(v){return v.veiculo_id!=id;});
  DB.manutencoes=DB.manutencoes.filter(function(m){return m.veiculo_id!=id;});
  if(DB.despesas) DB.despesas=DB.despesas.filter(function(d){return d.placa!==vRef.placa;});
  fdel('veiculos',id);
  cts.forEach(function(c){fdel('contratos',c.id);});
  vds.forEach(function(v){fdel('vendas',v.id);});
  mts.forEach(function(m){fdel('manutencoes',m.id);});
  sDB(); renderVeic();
  toast('Veiculo excluido com sucesso','ok');
}

  var v = DB.veiculos.find(function(x){return x.id==id;});
  if(!v) return;
  var hoje = new Date().toISOString().split('T')[0];
  var limite = new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  om(

    '<div class="fr">'+
    '<div class="fg full"><label>Nome do Interessado *</label>'+
    '<input id="rnome" placeholder="Nome do cliente interessado"></div></div>'+
    '<div class="fr">'+
    '<div class="fg"><label>Valor do Sinal (R$)</label>'+

function svReservar(id){
  var nome   = document.getElementById('rnome').value.trim();
  var limite = document.getElementById('rlimite').value;
  if(!nome||!limite){toast('Informe o nome do interessado e a data limite','err');return;}
  DB.veiculos = DB.veiculos.map(function(v){
    if(v.id!=id) return v;
    return Object.assign({},v,{
      status:'reservado',
      reserva_nome:nome,
      reserva_sinal:document.getElementById('rsinal').value,
      reserva_limite:limite,
      reserva_obs:document.getElementById('robs').value,
    });
  });
  var vUpd = DB.veiculos.find(function(x){return x.id==id;});
  sDB(); fsave('veiculos',vUpd); cm(); renderVeic();
  toast('Veiculo reservado para '+nome,'ok');
}

function liberarReserva(id){
  var v = DB.veiculos.find(function(x){return x.id==id;});
  if(!v) return;
  var msg = 'Liberar reserva';
  if(v.reserva_nome) msg += ' de '+v.reserva_nome;
  msg += '? O veiculo voltara para Disponivel.';
  if(!confirm(msg)) return;
  DB.veiculos = DB.veiculos.map(function(x){
    if(x.id!=id) return x;
    var c = Object.assign({},x);
    c.status='disponivel';
    delete c.reserva_nome; delete c.reserva_sinal;
    delete c.reserva_limite; delete c.reserva_obs;
    return c;
  });
  var vUpd = DB.veiculos.find(function(x){return x.id==id;});
  sDB(); fsave('veiculos',vUpd); renderVeic();
  toast('Reserva liberada. Veiculo disponivel novamente.','ok');
}

// ── Histórico do Veículo (Bloco 13) ─────────────────────────
function verHistorico(id){
  var v = DB.veiculos.find(function(x){return x.id==id;});
  if(!v) return;

  var cts  = DB.contratos.filter(function(c){return c.veiculo_id==id;});
  var mts  = DB.manutencoes.filter(function(m){return m.veiculo_id==id;});
  var dps  = (DB.despesas||[]).filter(function(d){return d.placa===v.placa;});
  var vda  = DB.vendas.find(function(x){return x.veiculo_id==id;});

  var totMt  = mts.reduce(function(s,m){return s+Number(m.valor||0);},0);
  var totDp  = dps.reduce(function(s,d){return s+Number(d.valor||0);},0);
  var custo  = Number(v.valor_compra||0);
  var custoT = custo+totMt+totDp+(vda?Number(vda.custo_preparacao||0):0);
  var vlVenda= vda?Number(vda.valor||0):0;
  var lucro  = vlVenda>0&&custo>0 ? vlVenda-custoT : null;

  // Bloco financeiro
  var finHtml='<div class="card" style="margin-bottom:14px;background:var(--card2)"><div class="shd">&#128200; Resumo Financeiro</div>'+
    '<div class="sr2"><span style="color:var(--t2)">Valor de compra</span><span style="font-weight:700">'+(custo?'R$ '+brl(custo):'Nao informado')+'</span></div>'+
    '<div class="sr2"><span style="color:var(--t2)">Total manutencoes</span><span style="font-weight:700;color:var(--warn)">R$ '+brl(totMt)+'</span></div>'+
    '<div class="sr2"><span style="color:var(--t2)">Total despesas</span><span style="font-weight:700;color:var(--warn)">R$ '+brl(totDp)+'</span></div>'+
    (vda?'<div class="sr2"><span style="color:var(--t2)">Custo preparacao</span><span style="font-weight:700;color:var(--warn)">R$ '+brl(vda.custo_preparacao||0)+'</span></div>':'')+''+
    '<div class="sr2" style="border-top:1px solid var(--border);margin-top:4px;padding-top:12px"><span style="color:var(--t2);font-weight:700">Custo total</span><span style="font-weight:800;color:var(--err)">R$ '+brl(custoT)+'</span></div>'+
    (vlVenda?'<div class="sr2"><span style="color:var(--t2);font-weight:700">Valor de venda</span><span style="font-weight:800;color:var(--ok)">R$ '+brl(vlVenda)+'</span></div>':'')+''+
    (lucro!==null?'<div class="sr2"><span style="color:var(--t2);font-weight:800">Lucro liquido</span><span style="font-weight:900;font-size:16px;color:'+(lucro>=0?'var(--ok)':'var(--err)')+'">R$ '+brl(lucro)+'</span></div>':'')+
    '</div>';

  // Contratos
  var ctsHtml='<div class="card" style="margin-bottom:14px"><div class="shd">&#128196; Contratos ('+cts.length+')</div>'+
    (cts.length?cts.map(function(c){
      return '<div class="di"><div><div style="font-weight:700">'+c.numero+'</div>'+
      '<div style="font-size:11px;color:var(--t3)">'+(cNome(c.cliente_id)||fNome(c.fornecedor_id)||'-')+' &bull; '+fd(c.data)+'</div></div>'+
      '<div><span class="badge bg-b">'+c.tipo+'</span> R$ '+brl(c.valor)+'</div></div>';
    }).join(''):'<div style="font-size:12px;color:var(--t3)">Nenhum contrato</div>')+
    '</div>';

  // Manutenções
  var mtsHtml='<div class="card" style="margin-bottom:14px"><div class="shd">&#128295; Manutencoes ('+mts.length+') &mdash; Total: R$ '+brl(totMt)+'</div>'+
    (mts.length?mts.map(function(m){
      return '<div class="di"><div><div style="font-weight:700">'+m.tipo+'</div>'+
      '<div style="font-size:11px;color:var(--t3)">'+(m.oficina||'-')+' &bull; '+fd(m.data)+'</div></div>'+
      '<span style="font-weight:700;color:var(--warn)">R$ '+brl(m.valor)+'</span></div>';
    }).join(''):'<div style="font-size:12px;color:var(--t3)">Nenhuma manutencao</div>')+
    '</div>';

  // Despesas
  var dpsHtml='<div class="card" style="margin-bottom:14px"><div class="shd">&#128181; Despesas ('+dps.length+') &mdash; Total: R$ '+brl(totDp)+'</div>'+
    (dps.length?dps.map(function(d){
      return '<div class="di"><div><div style="font-weight:700">'+(d.fornecedor||'-')+'</div>'+
      '<div style="font-size:11px;color:var(--t3)">'+(d.descricao||'-')+' &bull; '+fd(d.data)+'</div></div>'+
      '<span style="font-weight:700;color:var(--accent)">R$ '+brl(d.valor)+'</span></div>';
    }).join(''):'<div style="font-size:12px;color:var(--t3)">Nenhuma despesa</div>')+
    '</div>';

  // Venda
  var vdaHtml=vda?'<div class="card" style="margin-bottom:14px;border-color:rgba(34,197,94,.3)"><div class="shd" style="color:var(--ok)">&#128176; Venda ('+fd(vda.data)+')</div>'+
    '<div class="di"><div><div style="font-weight:700">'+cNome(vda.cliente_id)+'</div>'+

    '<span style="font-weight:900;font-size:16px;color:var(--ok)">R$ '+brl(vda.valor)+'</span></div></div>':'';

  om(
    '<div class="mt2">'+
    '<div>'+

    vdaHtml+finHtml+ctsHtml+mtsHtml+dpsHtml+
    '<div class="mf"><button class="btn bg2" onclick="cm()">Fechar</button></div>',
    true
  );
}
