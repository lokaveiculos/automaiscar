// ── Theme toggle ─────────────────────────────────────────────
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'light';
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('am_theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  var icon  = document.getElementById('theme-icon');
  var label = document.getElementById('theme-label');
  if(icon)  icon.setAttribute('data-lucide', theme === 'dark' ? 'moon' : 'sun');
  if(label) label.textContent = theme === 'dark' ? 'Tema Escuro' : 'Aparência';
  if(typeof lucide !== 'undefined') lucide.createIcons();
}
(function(){
  var saved = localStorage.getItem('am_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  // Apply after DOM ready
  document.addEventListener('DOMContentLoaded', function(){ updateThemeBtn(saved); });
})();

function tsb() {
  var sb = document.getElementById('sb');
  var ov = document.getElementById('sb-overlay');
  if(!sb) return;
  sb.classList.toggle('open');
  if(ov) ov.classList.toggle('open');
}
function csb() {
  var sb = document.getElementById('sb');
  var ov = document.getElementById('sb-overlay');
  if(sb) sb.classList.remove('open');
  if(ov) ov.classList.remove('open');
}

}

// ── Toast (design system) ─────────────────────────────────────
(function(){
  var stack = document.createElement('div');
  stack.className = 'toast-stack';
  document.body.appendChild(stack);
  
  window.toast = function(msg, type, dur) {
    type = type || 'ok';
    dur  = dur  || 3000;
    var icons = {ok:'check',err:'x-circle',warn:'alert-triangle',info:'info'};
    var el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.innerHTML = '<i data-lucide="' + (icons[type]||'check') + '"></i><span>' + msg + '</span>';
    stack.appendChild(el);
    if(typeof lucide !== 'undefined') lucide.createIcons({nodes:[el]});
    setTimeout(function(){
      el.style.animation = 'toastOut 300ms ease forwards';
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, dur);
  };
})();

function impTermoChecklist(vid){
  const venda=DB.vendas.find(x=>x.id==vid);

  const ct=DB.contratos.find(x=>x.id==venda.contrato_id);

function dlVenda(id){
  if(confirm('Excluir venda? O veiculo voltara para disponivel.')){
    const v=DB.vendas.find(x=>x.id==id);
    if(v)DB.veiculos=DB.veiculos.map(x=>x.id==v.veiculo_id?Object.assign({},x,{status:'disponivel'}):x);

  var itens=[
    ['Documentacao',['CRLV/CRV original','Chave reserva','Manual do proprietario','Garantia de fabrica (se houver)']],

    ['Interior',['Painel sem avisos','Ar-condicionado','Som/Multimidia','Vidros eletricos','Travas de portas','Cinto de seguranca','Estofamentos']],

  html+='<div class="grid2"><div class="campo"><label>Placa</label><span>'+v.placa+'</span></div>';
  html+='<div class="campo"><label>KM Entrega</label><span>'+Number(v.km||0).toLocaleString('pt-BR')+'</span></div></div></div></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:5pt">'+cols+'</div>';
  html+='<div class="campo" style="margin-top:4pt"><label>Nivel de combustivel na entrega</label><span>&#9744; Reserva &nbsp; &#9744; 1/4 &nbsp; &#9744; 1/2 &nbsp; &#9744; 3/4 &nbsp; &#9744; Cheio</span></div>';
  html+='<p class="j small" style="margin-top:4pt">Declaro ter recebido o veiculo nas condicoes indicadas neste checklist, em perfeito estado de funcionamento.</p>';
  html+='<div class="local">'+(e.cidade||'Feira de Santana')+' - '+(e.uf||'BA')+', '+dt+'.</div>';
  html+='<div class="assinaturas"><div class="assin"><div class="assin-linha"></div><div class="assin-nome">'+cl.nome+'</div><div class="assin-cargo">COMPRADOR(A) - CPF: '+cl.cpf+'</div></div>';
  html+='<div class="assin"><div class="assin-linha"></div><div class="assin-nome">Responsavel pela Entrega</div><div class="assin-cargo">AUTO MAIS VEICULOS LTDA</div></div></div></div>';
  return html;
}

// ── vizCtDoc — executa a geração dos documentos selecionados ──
function vizCtDoc(id, action){
  var c=DB.contratos.find(function(x){return x.id==id;});if(!c)return;
  function sel(k){var el=document.getElementById('doc_'+k);return el&&el.checked;}
  var partes=[];
  if(c.tipo==='venda'){
    if(sel('cv'))         partes.push(gerarCV_simples(c));
    if(sel('ciencia'))    partes.push(gerarTermoCiencia(c));
    if(sel('checklist'))  partes.push(gerarChecklist_html(c));
    if(sel('uber'))       partes.push(gerarTermoUber(c));
  } else {
    partes.push('<div class="page"><pre style="font-family:monospace;font-size:9pt;white-space:pre-wrap">'+
      (c.tipo==='compra'?gerarCompra(c):gerarConsig(c))+'</pre></div>');
  }
  if(!partes.length){toast('Selecione ao menos um documento','warn');return;}
  var html_full=partes.join('\n');
  if(action==='print'){
    cm();
    impWin(html_full,'Contrato '+c.numero);
  } else {
    cm();
    om(
      '<div class="mt2"><span>&#128196; Preview - Contrato '+c.numero+'</span>'+
      '<button class="btn bg2 bsm" onclick="cm()">&#10005;</button></div>'+
      '<div style="padding:12px;max-height:65vh;overflow-y:auto;background:#f5f5f5;overflow-x:hidden">'+
        '<div style="transform:scale(.6);transform-origin:top left;width:167%;pointer-events:none">'+html_full+'</div>'+
      '</div>'+
      '<div class="mf">'+
        '<button class="btn bg2" onclick="cm()">Fechar</button>'+
        '<button class="btn bp" onclick="vizCtDoc('+id+',\'print\')">&#128438; Imprimir</button>'+
      '</div>',
      true
    );
  }
}

checkAuth(function() {
  applyProfile();
  if (DB && DB.veiculos && DB.veiculos.length > 0) {
    render();
  } else {
    showLoading('Carregando vendas...');
  }
  loadFromFirestore().then(function() {

    var preVid = Number(params.get('vid')) || null;
    if (preVid) { setTimeout(function(){ novaVenda(preVid); }, 100); }
    else { render(); }
  }).catch(function(e){ console.error('[vendas]', e); });
});


function vizCt(id){
  var c=DB.contratos.find(function(x){return x.id==id;});
  if(!c) return;
  var eh_venda = c.tipo==='venda';

  var docs = eh_venda ? [
    {id:'cv',      label:'Contrato de Compra e Venda', icon:'&#128196;', checked:true},
    {id:'ciencia', label:'Termo de Ci\u00eancia e Responsabilidade', icon:'&#128203;', checked:true},
    {id:'checklist',label:'Checklist do Ve\u00edculo', icon:'&#9989;',  checked:true},
    {id:'uber',    label:'Anexo I \u2013 Termo de Garantia (Uber/Aplicativo)', icon:'&#128663;', checked:false}
  ] : [
    {id:'contrato',label:'Contrato', icon:'&#128196;', checked:true}
  ];

  var rows = docs.map(function(d){
    return '<label style="display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;background:var(--surface);margin-bottom:8px">'+
      '<input type="checkbox" id="doc_'+d.id+'" '+(d.checked?'checked':'')+' onclick="event.stopPropagation()" style="width:18px;height:18px;accent-color:var(--brand);cursor:pointer">'+
      '<span style="font-size:20px">'+d.icon+'</span>'+
      '<div><div style="font-size:14px;font-weight:600;color:var(--text)">'+d.label+'</div>'+
      (d.id==='uber'?'<div style="font-size:12px;color:var(--text-muted)">Apenas para motoristas de aplicativo</div>':'')+
      '</div></label>';
  }).join('');

  om(
    '<div class="mt2">'+
      '<span>&#128196; Contrato N\u00ba '+c.numero+'</span>'+
      '<button class="btn bg2 bsm" onclick="cm()">&#10005;</button>'+
    '</div>'+
    '<div class="mb">'+
      '<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:12px">Selecione os documentos:</div>'+
      rows+
    '</div>'+
    '<div class="mf">'+
      '<button class="btn bg2" onclick="cm()">Cancelar</button>'+
      '<button class="btn bs" onclick="vizCtDoc('+id+',\'preview\')">&#128065; Visualizar</button>'+
      '<button class="btn bp" onclick="vizCtDoc('+id+',\'print\')">&#128438; Imprimir</button>'+
    '</div>',
    true
  );
}



function impUber(id){
  var c=DB.contratos.find(function(x){return x.id==id;});if(!c)return;
  impWin(gerarTermoUber(c),'Termo Uber '+c.numero);
}
