<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto Mais - Vendas</title><style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1c1d28;--sb:#13141e;--card:#22233a;--card2:#2a2b42;--border:#32344a;--border2:#3d3f58;--accent:#f5a623;--ah:#f7b84b;--adim:rgba(245,166,35,.13);--adim2:rgba(245,166,35,.06);--text:#eef0f8;--t2:#8890a8;--t3:#50546a;--ok:#22c55e;--err:#ef4444;--info:#3b82f6;--warn:#f59e0b;--r:8px;--rsm:5px;--rlg:12px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.main{margin-left:210px;flex:1;padding:28px;min-height:100vh}
.logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo-inner{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-name{font-size:14.5px;font-weight:900;color:var(--text)}
.logo-tag{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px}
.nav{flex:1;padding:8px 7px;overflow-y:auto}
.nsec{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;padding:13px 8px 4px;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rsm);cursor:pointer;font-size:12.5px;color:var(--t2);transition:all .12s;margin-bottom:1px;user-select:none;text-decoration:none}
.ni:hover{background:var(--adim2);color:var(--text)}
.ni.active{background:var(--adim);color:var(--accent);font-weight:700}
.sf{padding:12px 14px;border-top:1px solid var(--border)}
.sf-lbl{font-size:10px;color:var(--t3)}
.sf-name{font-size:12px;font-weight:700;color:var(--text);margin-top:2px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.pt{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.5px}
.ps{font-size:12px;color:var(--t3);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--rsm);border:none;cursor:pointer;font-size:12.5px;font-weight:700;transition:all .12s;white-space:nowrap;text-decoration:none}
.bp{background:var(--accent);color:#000}.bp:hover{background:var(--ah)}
.bg2{background:transparent;color:var(--t2);border:1px solid var(--border2)}.bg2:hover{background:var(--card2);color:var(--text)}
.bsm{padding:5px 10px;font-size:11.5px}
.bd{background:rgba(239,68,68,.1);color:var(--err);border:1px solid rgba(239,68,68,.2)}.bd:hover{background:rgba(239,68,68,.2)}
.bs{background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.bi{background:rgba(59,130,246,.1);color:var(--info);border:1px solid rgba(59,130,246,.2)}
.bw{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.shd{font-size:9.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.si{font-size:20px;margin-bottom:8px}.sl{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.sv{font-size:26px;font-weight:900;margin-top:4px}
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:480px}
th{background:var(--card2);font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);padding:11px 16px;text-align:left;font-weight:800;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 16px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--adim2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.bg-g{background:rgba(34,197,94,.1);color:var(--ok)}.bg-y{background:rgba(245,158,11,.1);color:var(--warn)}.bg-r{background:rgba(239,68,68,.1);color:var(--err)}.bg-b{background:rgba(59,130,246,.1);color:var(--info)}.bg-gr{background:rgba(255,255,255,.04);color:var(--t2)}.bg-o{background:var(--adim);color:var(--accent)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}.fg.full{grid-column:1/-1}
label{font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{background:#0a0a0a;border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 11px;font-size:13px;color:var(--text);outline:none;transition:border .12s;width:100%;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--adim)}
select option{background:#111}
textarea{resize:vertical;min-height:70px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.md{background:var(--card);border:1px solid var(--border2);border-radius:var(--rlg);padding:26px;width:100%;max-width:700px;max-height:92vh;overflow-y:auto}
.md-lg{max-width:900px}
.mt2{font-size:16px;font-weight:900;margin-bottom:18px;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.mf{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.sb2{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sw{flex:1;position:relative;min-width:180px}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.sw input{padding-left:30px}
.acts{display:flex;gap:5px}
.empty{text-align:center;padding:48px;color:var(--t3)}
.ei{font-size:30px;display:block;margin-bottom:10px;opacity:.35}
.av{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.ct{background:#050505;border:1px solid var(--border);border-radius:var(--r);padding:18px;font-size:11.5px;line-height:1.95;color:#bbb;white-space:pre-wrap;font-family:'Courier New',monospace;max-height:420px;overflow-y:auto}
.ib{background:var(--adim2);border:1px solid rgba(249,115,22,.15);border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:var(--t2);margin-bottom:12px}
.g2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
.sr2{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.sr2:last-child{border-bottom:none}
.di{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.di:last-child{border-bottom:none}
.hidden{display:none}
.mbtn{display:none;position:fixed;top:14px;left:14px;z-index:200;width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);cursor:pointer;align-items:center;justify-content:center;font-size:16px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.ov.show{display:block}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.placa-wrap{display:flex;flex-wrap:wrap;gap:20px;padding:8px 0}
.placa{background:#fff;color:#000;border-radius:10px;overflow:hidden;width:310px;border:2px solid #111;page-break-inside:avoid}
.pph{background:#000;color:#f97316;padding:10px 16px;text-align:center}
.plogo{font-size:18px;font-weight:900;letter-spacing:1px}
.psub2{font-size:8px;letter-spacing:3px;color:#555;margin-top:1px;text-transform:uppercase}
.pb{padding:14px 16px}
.pm{font-size:21px;font-weight:900;color:#000;line-height:1.1}
.pa{font-size:12px;color:#555;margin-top:2px}
.pp-lbl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:10px}
.pp{font-size:32px;font-weight:900;color:#f97316;line-height:1}
.pinfos{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:10px 0}
.pinfo{background:#f5f5f5;border-radius:4px;padding:5px 8px}
.pil{font-size:8px;color:#888;text-transform:uppercase;font-weight:700}
.piv{font-size:12px;font-weight:800;color:#000}
.pfoot{background:#000;color:#fff;padding:8px 16px;text-align:center}
.ptel{font-size:13px;font-weight:900;color:#f97316}
.pftel{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px}
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-box{width:17px;height:17px;border:2px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cl-box.ck{background:var(--accent);border-color:var(--accent);color:#000;font-size:11px}
.cl-sec{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
@media(max-width:900px){.sg{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}

/* ── Overflow prevention ─────────────────────────── */
html{overflow-x:hidden}
body{overflow-x:hidden;max-width:100vw}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{min-width:560px}

@media(max-width:900px){.sg{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}

@media(max-width:640px){
  html,body{overflow-x:hidden}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  /* Main — espaço para o hamburguer no topo */
  .main{margin-left:0;padding:16px;padding-top:64px}
  /* Stats grid 2 colunas */
  .sg{grid-template-columns:1fr 1fr!important}
  /* Formulários colapsam para 1 coluna */
  .fr{grid-template-columns:1fr}
  .fr .fg.full{grid-column:1}
  /* Hamburguer visível */
  .mbtn{display:flex}
  /* Modal — sobe da base no mobile */
  .mo{padding:0;align-items:flex-end}
  .md{max-height:92vh;border-radius:12px 12px 0 0;padding:18px;width:100%;max-width:100%}
  /* Page header empilha verticalmente */
  .ph{flex-direction:column;align-items:stretch}
  .ph>div:last-child,.ph>div:first-child+div{
    display:flex;flex-wrap:wrap;gap:8px
  }
  /* Tabs com scroll horizontal */
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;padding-bottom:2px}
  .tab{white-space:nowrap;flex-shrink:0}
  /* Botões de ação nas tabelas */
  .acts{flex-wrap:wrap;gap:4px}
  /* Cards */
  .card{padding:14px}
  /* Inputs full-width no modal */
  .md input,.md select,.md textarea{font-size:16px}
}

@media(max-width:400px){
  .main{padding:12px;padding-top:60px}
  .sg{grid-template-columns:1fr 1fr}
  .sc .sv{font-size:20px}
  table{min-width:500px}
}
@media print{.sidebar,.btn,.sb2,.mbtn,.ov,.nsec{display:none!important}.main{margin-left:0;padding:0}body{background:#fff;color:#000}}</style>

function om(h,lg){const md=document.getElementById('mdc');md.className='md'+(lg?' md-lg':'');md.innerHTML=h;document.getElementById('modal').classList.remove('hidden');}

'\n  '+e.endereco+', '+e.bairro+' - '+e.cidade+'/'+e.uf+
'\n  Tel: '+e.telefone+' | '+e.email+

'\n  CPF: '+cl.cpf+(cl.rg?'   RG: '+cl.rg:'')+
'\n  '+(nasc?'Nasc: '+nasc+'   ':'')+' Estado Civil: '+(cl.estado_civil||'-')+'   Profissao: '+(cl.profissao||'-')+
'\n  End: '+cl.endereco+' - '+(cl.cidade||'')+'/'+(cl.uf||'')+'   CEP: '+(cl.cep||'')+
'\n  Tel: '+cl.telefone+(cl.email?'   Email: '+cl.email:'')+
'\n\n'+ls+

'  O VENDEDOR, como legitimo proprietario, vende ao COMPRADOR:\n\n'+
'  Marca/Modelo: '+v.marca+' '+v.modelo+' '+(v.versao||'')+
'\n  Ano: '+v.ano+'   Cor: '+v.cor+'   Combustivel: '+v.combustivel+
'\n  Placa: '+v.placa+'   RENAVAM: '+(v.renavam||'________________')+

'\n  KM: '+Number(v.km||0).toLocaleString('pt-BR')+' km'+
'\n  Opcionais: '+(v.opcionais||'Conforme vistoria')+
(c.obs?'\n  Obs: '+c.obs:'')+
'\n\n'+ls+
'\nCLAUSULA 2 - DO PRECO E CONDICOES DE PAGAMENTO\n\n'+
'  Valor total:   R$ '+brl(c.valor)+'\n'+
'  Entrada:       R$ '+brl(c.entrada||'0')+'\n'+
'  Saldo:         R$ '+saldo+'\n'+
'  Pagamento:     '+c.pagamento+'\n'+
(c.financeira?'  Financeira:    '+c.financeira+'\n':'')+
(Number(c.num_parcelas||0)>0?'  Parcelamento:  '+c.num_parcelas+'x de R$ '+brl(c.valor_parcela||'0')+'\n':'')+
'\n'+ls+
'\nCLAUSULA 3 - DA GARANTIA\n\n'+
'  3.1 Conforme o CDC (Lei 8.078/90, art. 26), garantia de\n'+
'  90 (noventa) dias contra vicios ocultos.\n\n'+
'  3.2 A garantia cobre defeitos mecanicos ocultos nao\n'+
'  aparentes na data da venda e nao informados acima.\n\n'+
'  3.3 EXCLUIDOS da garantia:\n'+
'    a) Desgastes naturais (pneus, pastilhas, filtros);\n'+
'    b) Danos por uso indevido ou acidente;\n'+
'    c) Defeitos preexistentes informados ao COMPRADOR;\n'+
'    d) Itens de manutencao de rotina.\n\n'+

'\nCLAUSULA 4 - OBRIGACOES DO VENDEDOR\n\n'+
'  4.1 Entregar o veiculo livre de multas, IPVA e DPVAT\n'+

'\nCLAUSULA 5 - OBRIGACOES DO COMPRADOR\n\n'+
'  5.1 Efetuar o pagamento nas condicoes acordadas, sob\n'+
'  pena de multa de 2% ao mes sobre o valor em atraso.\n\n'+
'  5.2 Transferir o veiculo em ate 30 dias, arcando com\n'+

'  da data de entrega.\n\n'+ls+

'TESTEMUNHAS:\n'+
'_______________________    _______________________\n'+
'Nome:                      Nome:\nCPF:                       CPF:';
}

function verChecklist(vid){
  const venda=DB.vendas.find(x=>x.id==vid);if(!venda)return;
  const v=vObj(venda.veiculo_id),cl=cObj(venda.cliente_id);
  const secs=[
    {t:'Documentacao',i:['CRLV / DUT em maos','Manual do proprietario','Chave reserva','Nota fiscal / Recibo assinado']},
    {t:'Itens do Veiculo',i:['Estepe em boas condicoes','Macaco e chave de roda','Triangulo de sinalizacao','Extintor valido']},
    {t:'Vistoria Exterior',i:['Lataria sem avarias nao informadas','Vidros e retrovisores integros','Pneus em bom estado','Luzes funcionando']},
    {t:'Vistoria Interior',i:['Bancos e estofados ok','Painel sem alertas','Ar condicionado ok','Multimidia ok']},
    {t:'Entrega Final',i:['KM: '+Number(v.km||0).toLocaleString('pt-BR'),'Combustivel informado','Controles explicados ao comprador','Recibo de quitacao assinado']},
  ];
  const html=secs.map(s=>'<div class="cl-sec">'+s.t+'</div>'+s.i.map(it=>'<div class="cl-item" onclick="tgCl(this)"><div class="cl-box">&#10003;</div><span>'+it+'</span></div>').join('')).join('');
  om('<div class="mt2"><span>&#10004; Checklist de Entrega</span><button class="btn bg2 bsm" onclick="cm()">X</button></div>'+
  '<div style="padding:12px;background:var(--adim2);border-radius:var(--rsm);font-size:12px;margin-bottom:12px">'+
  '<b>Veiculo:</b> '+v.marca+' '+v.modelo+' '+v.placa+'<br>'+
  '<b>Cliente:</b> '+cl.nome+'<br>'+
  '<b>Data:</b> '+fd(venda.data)+'</div>'+html+
  '<div style="margin-top:18px;padding:14px;border:1px solid var(--border2);border-radius:var(--rsm)">'+
  '<div style="font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;margin-bottom:10px">Assinaturas</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;font-size:12px;color:var(--t2)">'+
  '<div style="border-top:1px solid var(--border2);padding-top:8px;text-align:center">'+cl.nome+'<br><small>Comprador</small></div>'+
  '<div style="border-top:1px solid var(--border2);padding-top:8px;text-align:center">Auto Mais Veiculos<br><small>Vendedor</small></div>'+
  '</div></div>'+
  '<div class="mf"><button class="btn bg2" onclick="cm()">Fechar</button><button class="btn bp" onclick="impChecklist()">&#128438; Imprimir</button></div>',true);
}

function autoPreco(){
  var sel=document.getElementById('vdveic');if(!sel)return;
  var v=DB.veiculos.find(function(x){return x.id==Number(sel.value);});
  if(v){var f=document.getElementById('vdval');if(f&&!f.value)f.value=v.preco;}
}
function svVenda(){
  const vid=Number(document.getElementById('vdveic').value);
  const cid=Number(document.getElementById('vdcli').value);
  const val=document.getElementById('vdval').value;
  const pag=document.getElementById('vdpag').value;
  const data=document.getElementById('vddata').value;
  if(!vid||!cid||!val){toast('Selecione Veiculo, Cliente e informe o Valor','err');return;}
  const num=document.getElementById('vdnum').value;
  const ent=document.getElementById('vdent').value||'0';
  const fin=document.getElementById('vdfin').value;
  const np=document.getElementById('vdnp').value||'0';
  const vp=document.getElementById('vdvp').value||'0';
  const obs=document.getElementById('vdobs').value;
  const ct={id:nid(DB.contratos),tipo:'venda',numero:num.replace('VD','CV'),data,cliente_id:cid,fornecedor_id:'',veiculo_id:vid,valor:val,entrada:ent,saldo:String(Number(val)-Number(ent)),pagamento:pag,financeira:fin,num_parcelas:np,valor_parcela:vp,prazo:'',tipo_comissao:'percentual',comissao:'',valor_minimo:'',condicao:'',debitos:'',status:'ativo',obs};
  DB.contratos.push(ct);
  const venda={id:nid(DB.vendas),numero:num,data,cliente_id:cid,veiculo_id:vid,valor:val,pagamento:pag,contrato_id:ct.id,obs};
  DB.vendas.push(venda);
  DB.veiculos=DB.veiculos.map(v=>v.id==vid?Object.assign({},v,{status:'vendido'}):v);
  sDB();
  fsave("contratos",ct);
  fsave("vendas",venda);
  var vVendido=DB.veiculos.find(function(x){return x.id==vid;});
  if(vVendido) fsave("veiculos",vVendido);
  cm();typeof history!=='undefined'&&window.location.protocol!=='file:'?history.replaceState(null,'','vendas.html'):null;render();
  toast('Venda registrada com sucesso! Contrato gerado.','ok');
  setTimeout(()=>verChecklist(venda.id),200);
}

function impTermoChecklist(vid){
  const venda=DB.vendas.find(x=>x.id==vid);
  if(!venda){alert('Venda nao encontrada.');return;}
  const ct=DB.contratos.find(x=>x.id==venda.contrato_id);
  if(!ct){alert('Contrato nao encontrado.');return;}
  const txtCV=gerarCV(ct);
  const txtTermo=gerarTermo(venda);
  const txtCheck=gerarChecklist(venda);
  const full=`${txtCV}\n\n${'═'.repeat(62)}\n\n${txtTermo}\n\n${'═'.repeat(62)}\n\n${txtCheck}`;
  const w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset=UTF-8><title>Contrato - '+vNome(venda.veiculo_id)+'</title><style>body{font-family:Courier New,monospace;font-size:11.5px;padding:24px 36px;line-height:1.85;color:#000;white-space:pre-wrap}@media print{body{padding:20px}}</style></head><body>'+full+'</body></html>');
  w.document.close();w.print();
}

let _docAtivo=1;
function showDoc(n){
  [1,2,3].forEach(i=>{
    document.getElementById('doc'+i).classList.add('hidden');
    document.getElementById('t'+i).classList.remove('active');
  });
  document.getElementById('doc'+n).classList.remove('hidden');
  document.getElementById('t'+n).classList.add('active');
  _docAtivo=n;
}
function impSingle(){
  const txt=document.getElementById('doc'+_docAtivo).innerText;
  impWin(txt);
}

function verCont(vid){
  const venda=DB.vendas.find(x=>x.id==vid);if(!venda)return;
  const ct=DB.contratos.find(x=>x.id==venda.contrato_id);if(!ct){alert('Contrato nao encontrado.');return;}
  const txt=gerarCV(ct);
  om('<div class="mt2"><span>&#128196; Contrato de Compra e Venda</span><button class="btn bg2 bsm" onclick="cm()">X</button></div>'+
  '<div class="ct" id="ctxt">'+txt+'</div>'+

}
function dlVenda(id){
  if(confirm('Excluir venda? O veiculo voltara para disponivel.')){
    const v=DB.vendas.find(x=>x.id==id);
    if(v)DB.veiculos=DB.veiculos.map(x=>x.id==v.veiculo_id?Object.assign({},x,{status:'disponivel'}):x);
    DB.vendas=DB.vendas.filter(x=>x.id!=id);
    sDB();fdel("vendas",id);
    if(v)fsave("veiculos",DB.veiculos.find(function(x){return x.id==v.veiculo_id;})||{id:0});
    render();
  }
}

}
