function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'light';
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('am_theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {

  var label = document.getElementById('theme-label');
  if(icon)  icon.setAttribute('data-lucide', theme === 'dark' ? 'moon' : 'sun');
  if(label) label.textContent = theme === 'dark' ? 'Tema Escuro' : 'Aparência';

}

(function(){
  var stack = document.createElement('div');
  stack.className = 'toast-stack';
  document.body.appendChild(stack);
  
  window.toast = function(msg, type, dur) {
    type = type || 'ok';
    dur  = dur  || 3000;
    var icons = {ok:'check',err:'x-circle',warn:'alert-triangle',info:'info'};
    var el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.innerHTML = '<i data-lucide="' + (icons[type]||'check') + '"></i><span>' + msg + '</span>';
    stack.appendChild(el);
    if(typeof lucide !== 'undefined') lucide.createIcons({nodes:[el]});
    setTimeout(function(){
      el.style.animation = 'toastOut 300ms ease forwards';
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, dur);
  };
})();

// ── vizCtDoc atualizado — usa HTML ────────────────────────────
function vizCtDoc(id, action){
  var c=DB.contratos.find(function(x){return x.id==id;}); if(!c)return;
  function sel(k){var el=document.getElementById('doc_'+k);return el&&el.checked;}
  var partes=[];
  if(c.tipo==='venda'){
    if(sel('cv'))        partes.push(gerarCV_simples(c));
    if(sel('ciencia'))   partes.push(gerarTermoCiencia(c));
    if(sel('checklist')) partes.push(gerarChecklist_html(c));
    if(sel('uber'))      partes.push(gerarTermoUber(c));
  } else {
    partes.push('<div class="page"><pre style="font-family:monospace;font-size:9pt;white-space:pre-wrap">'+
      (c.tipo==='compra'?gerarCompra(c):gerarConsig(c))+'</pre></div>');
  }
  if(!partes.length){toast('Selecione ao menos um documento','warn');return;}
  var html_full=partes.join('\n');

  if(action==='print'){
    cm();
    impWin(html_full, 'Contrato '+c.numero);
  } else {
    cm();
    // Preview simplificado
    var preview=partes.map(function(p){return '<div style="border:1pt solid #ccc;margin-bottom:6pt;padding:4pt;max-height:200px;overflow:hidden;position:relative">'+p+'<div style="position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,#fff)"></div></div>';}).join('');
    om(
      '<div class="mt2"><span>&#128196; Preview &mdash; Contrato '+c.numero+'</span>'+
      '<button class="btn bg2 bsm" onclick="cm()">&#10005;</button></div>'+
      '<div style="padding:12px;max-height:65vh;overflow-y:auto;background:#f5f5f5">'+
        '<div style="transform:scale(.65);transform-origin:top left;width:153%">'+html_full+'</div>'+
      '</div>'+
      '<div class="mf">'+
        '<button class="btn bg2" onclick="cm()">Fechar</button>'+
        '<button class="btn bp" onclick="vizCtDoc('+id+',\'print\')">&#128438; Imprimir</button>'+
      '</div>',
      true
    );
  }
}

function autoPreco(){
  var sel=document.getElementById('vdveic');if(!sel)return;
  var v=DB.veiculos.find(function(x){return x.id==Number(sel.value);});
  if(v){var f=document.getElementById('vdval');if(f&&!f.value)f.value=v.preco;}
}
function svVenda(){
  const vid=Number(document.getElementById('vdveic').value);
  const cid=Number(document.getElementById('vdcli').value);
  const val=document.getElementById('vdval').value;
  const pag=document.getElementById('vdpag').value;
  const data=document.getElementById('vddata').value;
  if(!vid||!cid||!val){toast('Selecione Veiculo, Cliente e informe o Valor','err');return;}
  const num=document.getElementById('vdnum').value;
  const ent=document.getElementById('vdent').value||'0';
  const fin=document.getElementById('vdfin').value;
  const np=document.getElementById('vdnp').value||'0';
  const vp=document.getElementById('vdvp').value||'0';
  const obs=document.getElementById('vdobs').value;
  const ct={id:nid(DB.contratos),tipo:'venda',numero:num.replace('VD','CV'),data,cliente_id:cid,fornecedor_id:'',veiculo_id:vid,valor:val,entrada:ent,saldo:String(Number(val)-Number(ent)),pagamento:pag,financeira:fin,num_parcelas:np,valor_parcela:vp,prazo:'',tipo_comissao:'percentual',comissao:'',valor_minimo:'',condicao:'',debitos:'',status:'ativo',obs};
  DB.contratos.push(ct);
  const venda={id:nid(DB.vendas),numero:num,data,cliente_id:cid,veiculo_id:vid,valor:val,pagamento:pag,contrato_id:ct.id,obs};
  DB.vendas.push(venda);
  DB.veiculos=DB.veiculos.map(v=>v.id==vid?Object.assign({},v,{status:'vendido'}):v);
  sDB();
  fsave("contratos",ct);
  fsave("vendas",venda);
  var vVendido=DB.veiculos.find(function(x){return x.id==vid;});
  if(vVendido) fsave("veiculos",vVendido);
  cm();typeof history!=='undefined'&&window.location.protocol!=='file:'?history.replaceState(null,'','vendas.html'):null;render();
  toast('Venda registrada com sucesso! Contrato gerado.','ok');
  setTimeout(()=>verChecklist(venda.id),200);
}

  const full=`${txtCV}\n\n${'═'.repeat(62)}\n\n${txtTermo}\n\n${'═'.repeat(62)}\n\n${txtCheck}`;

  w.document.write('<!DOCTYPE html><html><head><meta charset=UTF-8><title>Contrato - '+vNome(venda.veiculo_id)+'</title><style>body{font-family:Courier New,monospace;font-size:11.5px;padding:24px 36px;line-height:1.85;color:#000;white-space:pre-wrap}@media print{body{padding:20px}}</style></head><body>'+full+'</body></html>');
  w.document.close();w.print();
}

function modalContratosVenda(vid){
  const venda=DB.vendas.find(x=>x.id==vid);
  if(!venda){alert('Venda nao encontrada.');return;}
  const ct=DB.contratos.find(x=>x.id==venda.contrato_id);
  const txtCV=ct?gerarCV(ct):'Contrato nao encontrado.';
  const txtTermo=gerarTermo(venda);
  const txtCheck=gerarChecklist(venda);
  om('<div class="mt2"><span>&#128196; Documentos da Venda</span><button class="btn bg2 bsm" onclick="cm()">X</button></div>'+
  '<div class="tabs" style="margin-bottom:16px">'+
  '<div class="tab active" id="t1" onclick="showDoc(1)">Contrato C&V</div>'+
  '<div class="tab" id="t2" onclick="showDoc(2)">Termo de Ciencia</div>'+
  '<div class="tab" id="t3" onclick="showDoc(3)">Checklist Entrega</div>'+
  '</div>'+
  '<div id="doc1" class="ct">'+txtCV+'</div>'+
  '<div id="doc2" class="ct hidden">'+txtTermo+'</div>'+
  '<div id="doc3" class="ct hidden">'+txtCheck+'</div>'+
  '<div class="mf">'+
  '<button class="btn bg2" onclick="cm()">Fechar</button>'+
  '<button class="btn bw" onclick="impSingle()">&#128438; Imprimir Este</button>'+
  '<button class="btn bp" onclick="impTermoChecklist('+vid+')">&#128438; Imprimir Tudo (3 docs)</button>'+
  '</div>',true);
}
let _docAtivo=1;
function showDoc(n){
  [1,2,3].forEach(i=>{
    document.getElementById('doc'+i).classList.add('hidden');
    document.getElementById('t'+i).classList.remove('active');
  });
  document.getElementById('doc'+n).classList.remove('hidden');
  document.getElementById('t'+n).classList.add('active');
  _docAtivo=n;
}
function impSingle(){
  const txt=document.getElementById('doc'+_docAtivo).innerText;
  impWin(txt);
}

function verCont(vid){
  const venda=DB.vendas.find(x=>x.id==vid);if(!venda)return;
  const ct=DB.contratos.find(x=>x.id==venda.contrato_id);if(!ct){alert('Contrato nao encontrado.');return;}
  const txt=gerarCV(ct);
  om('<div class="mt2"><span>&#128196; Contrato de Compra e Venda</span><button class="btn bg2 bsm" onclick="cm()">X</button></div>'+
  '<div class="ct" id="ctxt">'+txt+'</div>'+
  '<div class="mf"><button class="btn bg2" onclick="cm()">Fechar</button><button class="btn bp" onclick="impWin(document.getElementById(\'ctxt\').innerText)">&#128438; Imprimir</button></div>',true);
}
function dlVenda(id){
  if(confirm('Excluir venda? O veiculo voltara para disponivel.')){
    const v=DB.vendas.find(x=>x.id==id);
    if(v)DB.veiculos=DB.veiculos.map(x=>x.id==v.veiculo_id?Object.assign({},x,{status:'disponivel'}):x);
    DB.vendas=DB.vendas.filter(x=>x.id!=id);
    sDB();fdel("vendas",id);
    if(v)fsave("veiculos",DB.veiculos.find(function(x){return x.id==v.veiculo_id;})||{id:0});
    render();
  }
}


function exportVendas(){
  var cols=[
    {label:'Numero',key:'numero'},
    {label:'Data',fn:function(v){return fd(v.data);}},
    {label:'Veiculo',fn:function(v){return vNome(v.veiculo_id);}},
    {label:'Cliente',fn:function(v){return cNome(v.cliente_id);}},
    {label:'Valor Venda',fn:function(v){return brl(v.valor);}},
    {label:'Pagamento',key:'pagamento'},
    {label:'Vendedor',fn:function(v){return v.vendedor_id?cNome(v.vendedor_id):'-';}},
    {label:'Comissao Pct',key:'comissao_pct'},
    {label:'Custo Prep',fn:function(v){return brl(v.custo_preparacao);}},
    {label:'Permuta Placa',key:'permuta_placa'},
    {label:'Permuta Valor',fn:function(v){return brl(v.permuta_valor);}},
  ];
  exportCSV(DB.vendas,'vendas-automais-'+Date.now()+'.csv',cols);
}
