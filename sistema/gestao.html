<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto Mais - Gestao</title><style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1c1d28;--sb:#13141e;--card:#22233a;--card2:#2a2b42;--border:#32344a;--border2:#3d3f58;--accent:#f5a623;--ah:#f7b84b;--adim:rgba(245,166,35,.13);--adim2:rgba(245,166,35,.06);--text:#eef0f8;--t2:#8890a8;--t3:#50546a;--ok:#22c55e;--err:#ef4444;--info:#3b82f6;--warn:#f59e0b;--r:8px;--rsm:5px;--rlg:12px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.main{margin-left:210px;flex:1;padding:28px;min-height:100vh}
.logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}




.nav{flex:1;padding:8px 7px;overflow-y:auto}
.nsec{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;padding:13px 8px 4px;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rsm);cursor:pointer;font-size:12.5px;color:var(--t2);transition:all .12s;margin-bottom:1px;user-select:none;text-decoration:none}
.ni:hover{background:var(--adim2);color:var(--text)}
.ni.active{background:var(--adim);color:var(--accent);font-weight:700}
.sf{padding:12px 14px;border-top:1px solid var(--border)}
.sf-lbl{font-size:10px;color:var(--t3)}
.sf-name{font-size:12px;font-weight:700;color:var(--text);margin-top:2px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.pt{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.5px}
.ps{font-size:12px;color:var(--t3);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--rsm);border:none;cursor:pointer;font-size:12.5px;font-weight:700;transition:all .12s;white-space:nowrap;text-decoration:none}
.bp{background:var(--accent);color:#000}.bp:hover{background:var(--ah)}
.bg2{background:transparent;color:var(--t2);border:1px solid var(--border2)}.bg2:hover{background:var(--card2);color:var(--text)}
.bsm{padding:5px 10px;font-size:11.5px}
.bd{background:rgba(239,68,68,.1);color:var(--err);border:1px solid rgba(239,68,68,.2)}.bd:hover{background:rgba(239,68,68,.2)}
.bs{background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.bi{background:rgba(59,130,246,.1);color:var(--info);border:1px solid rgba(59,130,246,.2)}
.bw{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.shd{font-size:9.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.si{font-size:20px;margin-bottom:8px}.sl{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.sv{font-size:26px;font-weight:900;margin-top:4px}
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:480px}
th{background:var(--card2);font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);padding:11px 16px;text-align:left;font-weight:800;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 16px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--adim2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.bg-g{background:rgba(34,197,94,.1);color:var(--ok)}.bg-y{background:rgba(245,158,11,.1);color:var(--warn)}.bg-r{background:rgba(239,68,68,.1);color:var(--err)}.bg-b{background:rgba(59,130,246,.1);color:var(--info)}.bg-gr{background:rgba(255,255,255,.04);color:var(--t2)}.bg-o{background:var(--adim);color:var(--accent)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}.fg.full{grid-column:1/-1}
label{font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{background:#0a0a0a;border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 11px;font-size:13px;color:var(--text);outline:none;transition:border .12s;width:100%;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--adim)}
select option{background:#111}
textarea{resize:vertical;min-height:70px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.md{background:var(--card);border:1px solid var(--border2);border-radius:var(--rlg);padding:26px;width:100%;max-width:700px;max-height:92vh;overflow-y:auto}
.md-lg{max-width:900px}
.mt2{font-size:16px;font-weight:900;margin-bottom:18px;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.mf{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.sb2{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sw{flex:1;position:relative;min-width:180px}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.sw input{padding-left:30px}
.acts{display:flex;gap:5px}
.empty{text-align:center;padding:48px;color:var(--t3)}
.ei{font-size:30px;display:block;margin-bottom:10px;opacity:.35}
.av{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.ct{background:#050505;border:1px solid var(--border);border-radius:var(--r);padding:18px;font-size:11.5px;line-height:1.95;color:#bbb;white-space:pre-wrap;font-family:'Courier New',monospace;max-height:420px;overflow-y:auto}
.ib{background:var(--adim2);border:1px solid rgba(249,115,22,.15);border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:var(--t2);margin-bottom:12px}
.g2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
.sr2{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.sr2:last-child{border-bottom:none}
.di{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.di:last-child{border-bottom:none}
.hidden{display:none}
.mbtn{display:none;position:fixed;top:14px;left:14px;z-index:200;width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);cursor:pointer;align-items:center;justify-content:center;font-size:16px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.ov.show{display:block}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.placa-wrap{display:flex;flex-wrap:wrap;gap:20px;padding:8px 0}
.placa{background:#fff;color:#000;border-radius:10px;overflow:hidden;width:310px;border:2px solid #111;page-break-inside:avoid}
.pph{background:#000;color:#f97316;padding:10px 16px;text-align:center}
.plogo{font-size:18px;font-weight:900;letter-spacing:1px}
.psub2{font-size:8px;letter-spacing:3px;color:#555;margin-top:1px;text-transform:uppercase}
.pb{padding:14px 16px}
.pm{font-size:21px;font-weight:900;color:#000;line-height:1.1}
.pa{font-size:12px;color:#555;margin-top:2px}
.pp-lbl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:10px}
.pp{font-size:32px;font-weight:900;color:#f97316;line-height:1}
.pinfos{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:10px 0}
.pinfo{background:#f5f5f5;border-radius:4px;padding:5px 8px}
.pil{font-size:8px;color:#888;text-transform:uppercase;font-weight:700}
.piv{font-size:12px;font-weight:800;color:#000}
.pfoot{background:#000;color:#fff;padding:8px 16px;text-align:center}
.ptel{font-size:13px;font-weight:900;color:#f97316}
.pftel{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px}
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-box{width:17px;height:17px;border:2px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cl-box.ck{background:var(--accent);border-color:var(--accent);color:#000;font-size:11px}
.cl-sec{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
@media(max-width:900px){.sg{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}

/* ── Overflow prevention ─────────────────────────── */
html{overflow-x:hidden}
body{overflow-x:hidden;max-width:100vw}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{min-width:560px}

@media(max-width:900px){.sg{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}

@media(max-width:640px){
  html,body{overflow-x:hidden}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  /* Main — espaço para o hamburguer no topo */
  .main{margin-left:0;padding:16px;padding-top:64px}
  /* Stats grid 2 colunas */
  .sg{grid-template-columns:1fr 1fr!important}
  /* Formulários colapsam para 1 coluna */
  .fr{grid-template-columns:1fr}
  .fr .fg.full{grid-column:1}
  /* Hamburguer visível */
  .mbtn{display:flex}
  /* Modal — sobe da base no mobile */
  .mo{padding:0;align-items:flex-end}
  .md{max-height:92vh;border-radius:12px 12px 0 0;padding:18px;width:100%;max-width:100%}
  /* Page header empilha verticalmente */
  .ph{flex-direction:column;align-items:stretch}
  .ph>div:last-child,.ph>div:first-child+div{
    display:flex;flex-wrap:wrap;gap:8px
  }
  /* Tabs com scroll horizontal */
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;padding-bottom:2px}
  .tab{white-space:nowrap;flex-shrink:0}
  /* Botões de ação nas tabelas */
  .acts{flex-wrap:wrap;gap:4px}
  /* Cards */
  .card{padding:14px}
  /* Inputs full-width no modal */
  .md input,.md select,.md textarea{font-size:16px}
}

@media(max-width:400px){
  .main{padding:12px;padding-top:60px}
  .sg{grid-template-columns:1fr 1fr}
  .sc .sv{font-size:20px}
  table{min-width:500px}
}
@media print{.sidebar,.btn,.sb2,.mbtn,.ov,.nsec{display:none!important}.main{margin-left:0;padding:0}body{background:#fff;color:#000}}</style>

function csb(){document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show');}

function impWin(txt){const w=window.open('','_blank');w.document.write('<!DOCTYPE html><html><head><meta charset=UTF-8><style>body{font-family:Courier New,monospace;font-size:12px;padding:28px;line-height:1.8;color:#000;white-space:pre-wrap}</style></head><body>'+txt+'</body></html>');w.document.close();w.print();}



let gTab='mnt';
checkAuth(function(){
  applyProfile();showLoading('Carregando gestao...');
  loadFromFirestore().then(function(){
    if(window.location.hash==='#rel') gTab='rel';
    if(window.location.hash==='#usr') gTab='usr';
    renderTab();
  });
});

function renderTab(){
  if(gTab==='rel'&&isAdmin()) renderRel();
  else if(gTab==='usr'&&isAdmin()) renderUsr();
  else if(gTab==='cfg'&&isAdmin()) renderCfg();
  else renderMnt();
}

function tabsHtml(active){
  var tabs=[['mnt','&#128295; Manutencao','renderMnt()']];
  if(isAdmin()){
    tabs.push(['rel','&#128200; Relatorios','renderRel()']);
    tabs.push(['usr','&#128100; Usuarios','renderUsr()']);
    tabs.push(['cfg','&#9881; Configuracoes','renderCfg()']);
  }
  return '<div class="tabs">' +
    tabs.map(function(t){
      return '<div class="tab'+(active===t[0]?' active':'')+'" onclick="gTab=\''+t[0]+'\';'+t[2]+'">'+t[1]+'</div>';
    }).join('') +
  '</div>';
}

function buildMntRows(list){
  if(!list.length) return '<div class="empty"><span class="ei">&#128295;</span>Nenhum registro</div>';
  let rows = list.map(function(m){
    return '<tr>' +
      '<td><div style="font-weight:700;font-family:monospace">'+m.placa+'</div>' +
      '<div style="font-size:11px;color:var(--t3)">'+vNome(m.veiculo_id)+'</div></td>' +
      '<td>'+m.tipo+'<div style="font-size:11px;color:var(--t3)">'+(m.descricao||'')+'</div></td>' +
      '<td style="font-size:12px">'+fd(m.data)+'</td>' +
      '<td style="font-size:12px;color:var(--t3)">'+(m.oficina||'-')+'</td>' +
      '<td style="font-weight:800;color:var(--accent)">R$ '+brl(m.valor)+'</td>' +
      '<td>'+sbM(m.status)+'</td>' +
      '<td><div class="acts">' +
      '<button class="btn bg2 bsm" onclick="fmMnt('+m.id+')">&#9999;</button>' +
      +(isAdmin()?'<button class="btn bd bsm" onclick="dlMnt('+m.id+')">&#128465;</button>':'')+
      '</div></td></tr>';
  }).join('');
  return '<div class="tw"><table>' +
    '<thead><tr><th>Veiculo</th><th>Servico</th><th>Data</th><th>Oficina</th><th>Valor</th><th>Status</th><th>Acoes</th></tr></thead>' +
    '<tbody>'+rows+'</tbody></table></div>';
}

function filtMnt(q){
  var fl = q
    ? DB.manutencoes.filter(function(m){ return vNome(m.veiculo_id).toLowerCase().includes(q.toLowerCase())||m.tipo.toLowerCase().includes(q.toLowerCase()); })
    : DB.manutencoes;
  var el = document.getElementById('mbody');
  if(el) el.innerHTML = buildMntRows(fl);
}

function fmMnt(id){
  var m = id ? DB.manutencoes.find(function(x){return x.id==id;}) : {veiculo_id:'',placa:'',tipo:'',data:'',valor:'',descricao:'',status:'pendente',oficina:''};
  var optsV = DB.veiculos.map(function(v){
    return '<option value="'+v.id+'" '+(v.id==m.veiculo_id?'selected':'')+'>'+v.marca+' '+v.modelo+' - '+v.placa+'</option>';
  }).join('');
  var optsS = ['pendente','andamento','concluida'].map(function(s){
    return '<option value="'+s+'" '+(m.status===s?'selected':'')+'>'+s+'</option>';
  }).join('');
  om(
    '<div class="mt2"><span>'+(id?'Editar':'Novo Registro')+'</span><button class="btn bg2 bsm" onclick="cm()">X</button></div>' +
    '<div class="fr"><div class="fg full"><label>Veiculo *</label>' +
    '<select id="mv" onchange="selVeic(this)"><option value="">Selecione...</option>'+optsV+'</select></div></div>' +
    '<input type="hidden" id="mpl" value="'+(m.placa||'')+'">' +
    '<div class="fr">' +
    '<div class="fg"><label>Servico *</label><input id="mtp" value="'+m.tipo+'" placeholder="Revisao, troca de oleo..."></div>' +
    '<div class="fg"><label>Status</label><select id="mst">'+optsS+'</select></div></div>' +
    '<div class="fr">' +
    '<div class="fg"><label>Data</label><input id="mdt" type="date" value="'+m.data+'"></div>' +
    '<div class="fg"><label>Valor (R$)</label><input id="mvl" type="number" value="'+m.valor+'" placeholder="500"></div></div>' +
    '<div class="fr"><div class="fg full"><label>Oficina / Prestador</label><input id="mof" value="'+(m.oficina||'')+'"></div></div>' +
    '<div class="fr"><div class="fg full"><label>Descricao</label><textarea id="mds">'+(m.descricao||'')+'</textarea></div></div>' +
    '<div class="mf"><button class="btn bg2" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svMnt('+(id||'null')+')">Salvar</button></div>'
  );
}
function selVeic(sel){
  var v = DB.veiculos.find(function(x){return x.id==sel.value;});
  var pl = document.getElementById('mpl');
  if(v && pl) pl.value = v.placa;
}
function svMnt(id){
  var vid = Number(document.getElementById('mv').value);
  var tp  = document.getElementById('mtp').value.trim();
  if(!vid||!tp){toast('Selecione o Veiculo e informe o Servico','err');return;}
  var vv = DB.veiculos.find(function(x){return x.id==vid;});
  var obj = {
    id: id||nid(DB.manutencoes), veiculo_id:vid,
    placa: vv?vv.placa:'', tipo:tp,
    status: document.getElementById('mst').value,
    data:   document.getElementById('mdt').value,
    valor:  document.getElementById('mvl').value,
    oficina:document.getElementById('mof').value,
    descricao:document.getElementById('mds').value
  };
  if(id) DB.manutencoes = DB.manutencoes.map(function(m){return m.id==id?obj:m;});
  else DB.manutencoes.push(obj);
  sDB(); fsave("manutencoes",obj); cm(); renderMnt();
  toast(id?'Manutencao atualizada':'Manutencao registrada','ok');
}
function dlMnt(id){
  if(confirm('Excluir registro?')){
    DB.manutencoes = DB.manutencoes.filter(function(m){return m.id!=id;});
    sDB(); fdel("manutencoes",id); renderMnt();
  }
}

// ── RELATORIOS ──────────────────────────────────────────────────
function renderRel(){
  var totV  = DB.vendas.reduce(function(s,v){return s+Number(v.valor||0);},0);
  var totM  = DB.manutencoes.reduce(function(s,m){return s+Number(m.valor||0);},0);
  var estV  = DB.veiculos.filter(function(v){return v.status!=='vendido';}).reduce(function(s,v){return s+Number(v.preco||0);},0);
  var vVend = DB.veiculos.filter(function(v){return v.status==='vendido';});

  var cards = [
    ['Faturamento Total','R$ '+brl(totV),'var(--ok)'],
    ['Veiculos Vendidos',vVend.length,'var(--info)'],
    ['Valor em Estoque','R$ '+brl(estV),'var(--accent)'],
    ['Custo Manutencao','R$ '+brl(totM),'var(--warn)']
  ].map(function(r){
    return '<div class="sc"><div class="sl">'+r[0]+'</div><div class="sv" style="color:'+r[2]+';font-size:20px;margin-top:6px">'+r[1]+'</div></div>';
  }).join('');

  var rowsVend = vVend.length===0
    ? '<tr><td colspan="8"><div class="empty"><span class="ei">&#128200;</span>Nenhum veiculo vendido</div></td></tr>'
    : vVend.map(function(v){
        var vda = DB.vendas.find(function(x){return x.veiculo_id==v.id;});
        return '<tr>' +
          '<td style="font-weight:700">'+v.marca+' '+v.modelo+'<div style="font-size:11px;color:var(--t3)">'+(v.versao||'')+'</div></td>' +
          '<td style="font-family:monospace;font-weight:700">'+v.placa+'</td>' +
          '<td>'+v.ano+'</td><td>'+v.cor+'</td>' +
          '<td>'+Number(v.km||0).toLocaleString('pt-BR')+' km</td>' +
          '<td style="font-weight:800;color:var(--ok)">R$ '+brl(vda?vda.valor:v.preco)+'</td>' +
          '<td>'+(vda?cNome(vda.cliente_id):'-')+'</td>' +
          '<td style="font-size:12px">'+(vda?fd(vda.data):'-')+'</td></tr>';
      }).join('');

  var rowsMnt = DB.veiculos.map(function(v){
    var ms = DB.manutencoes.filter(function(m){return m.veiculo_id==v.id;});
    if(!ms.length) return '';
    var totMv = ms.reduce(function(s,m){return s+Number(m.valor||0);},0);
    return '<div class="di">' +
      '<div><div style="font-weight:700">'+v.marca+' '+v.modelo+
      ' <span style="color:var(--t3);font-size:12px">'+v.placa+'</span></div>' +
      '<div style="font-size:11px;color:var(--t3)">'+ms.length+' servico(s)</div></div>' +
      '<span style="font-weight:800;color:var(--warn)">R$ '+brl(totMv)+'</span></div>';
  }).join('') || '<div class="empty"><span class="ei">&#128295;</span>Nenhuma manutencao</div>';

  document.getElementById('main').innerHTML =
    '<div class="ph"><div><div class="pt">Gestao</div></div>'+(isAdmin()?'<button class="btn bg2" onclick="exportRelatorio()">&#128229; Exportar</button>':'')+'</div>' +
    tabsHtml('rel') +
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">'+cards+'</div>' +
    '<div class="card" style="margin-bottom:16px"><div class="shd">Veiculos Vendidos</div>' +
    '<div class="tw" style="border:none"><table>' +
    '<thead><tr><th>Veiculo</th><th>Placa</th><th>Ano</th><th>Cor</th><th>KM</th><th>Valor Venda</th><th>Cliente</th><th>Data</th></tr></thead>' +
    '<tbody>'+rowsVend+'</tbody></table></div></div>' +
    '<div class="card"><div class="shd">Custo Manutencao por Veiculo</div>'+rowsMnt+'</div>';
}

// ── USUARIOS ────────────────────────────────────────────────────
function renderUsr(){
  var rows = DB.usuarios.map(function(u){
    var pBadge = u.perfil==='admin'?'bg-r':u.perfil==='gerente'?'bg-y':'bg-b';
    var sBadge = u.status==='ativo'?'bg-g':'bg-gr';
    return '<tr>' +
      '<td><div style="display:flex;align-items:center;gap:10px">' +
      '<div class="av" style="background:var(--adim);color:var(--accent)">'+ini(u.nome)+'</div>' +
      '<span style="font-weight:700">'+u.nome+'</span></div></td>' +
      '<td style="font-size:12px;color:var(--t3)">'+u.email+'</td>' +
      '<td><span class="badge '+pBadge+'">'+u.perfil+'</span></td>' +
      '<td><span class="badge '+sBadge+'">'+u.status+'</span></td>' +
      '<td><div class="acts">' +
      '<button class="btn bg2 bsm" onclick="fmUsr('+u.id+')">&#9999;</button>' +
      +(isAdmin()?'<button class="btn bd bsm" onclick="dlUsr('+u.id+')">&#128465;</button>':'')+
      '</div></td></tr>';
  }).join('');
  document.getElementById('main').innerHTML =
    '<div class="ph"><div><div class="pt">Gestao</div></div>' +
    '<button class="btn bp" onclick="fmUsr(null)">+ Novo Usuario</button></div>' +
    tabsHtml('usr') +
    '<div class="tw"><table>' +
    '<thead><tr><th>Usuario</th><th>Email</th><th>Perfil</th><th>Status</th><th>Acoes</th></tr></thead>' +
    '<tbody>'+(rows||'<tr><td colspan="5"><div class="empty"><span class="ei">&#128100;</span>Nenhum usuario</div></td></tr>')+'</tbody>' +
    '</table></div>';
}
function fmUsr(id){
  var u = id ? DB.usuarios.find(function(x){return x.id==id;}) : {nome:'',email:'',perfil:'vendedor',status:'ativo'};
  var optsP = ['admin','gerente','vendedor'].map(function(p){
    return '<option value="'+p+'" '+(u.perfil===p?'selected':'')+'>'+{admin:'Administrador',gerente:'Gerente',vendedor:'Vendedor'}[p]+'</option>';
  }).join('');
  var optsS = ['ativo','inativo'].map(function(s){
    return '<option value="'+s+'" '+(u.status===s?'selected':'')+'>'+s+'</option>';
  }).join('');
  om(
    '<div class="mt2"><span>'+(id?'Editar':'Novo Usuario')+'</span><button class="btn bg2 bsm" onclick="cm()">X</button></div>' +
    '<div class="fr"><div class="fg full"><label>Nome *</label><input id="un" value="'+u.nome+'"></div></div>' +
    '<div class="fr">' +
    '<div class="fg"><label>Email *</label><input id="ue" type="email" value="'+u.email+'"></div>' +
    '<div class="fg"><label>Perfil</label><select id="up">'+optsP+'</select></div></div>' +
    '<div class="fr"><div class="fg"><label>Status</label><select id="ust">'+optsS+'</select></div></div>' +
    '<div class="mf"><button class="btn bg2" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svUsr('+(id||'null')+')">Salvar</button></div>'
  );
}
function svUsr(id){
  var nome  = document.getElementById('un').value.trim();
  var email = document.getElementById('ue').value.trim();
  if(!nome||!email){toast('Preencha Nome e Email','err');return;}
  var obj = {id:id||nid(DB.usuarios), nome:nome, email:email,
    perfil: document.getElementById('up').value,
    status: document.getElementById('ust').value};
  if(id) DB.usuarios = DB.usuarios.map(function(u){return u.id==id?obj:u;});
  else DB.usuarios.push(obj);
  sDB(); fsave("usuarios",obj); cm(); renderUsr();
}
function dlUsr(id){
  if(confirm('Excluir usuario?')){
    DB.usuarios = DB.usuarios.filter(function(u){return u.id!=id;});
    sDB(); fdel("usuarios",id); renderUsr();
  }
}

// ── Configurações da Empresa (Bloco 10) ──────────────────────
function renderCfg(){
  var e = DB.empresa || {};
  document.getElementById('main').innerHTML =
  '<div class="ph"><div><div class="pt">Gestao</div></div>'+(isAdmin()?'<button class="btn bg2" onclick="exportRelatorio()">&#128229; Exportar</button>':'')+'</div>' +
  tabsHtml('cfg') +
  '<div class="card" style="max-width:620px">' +
  '<div class="shd">&#9881; Dados da Empresa</div>' +
  '<div class="fr"><div class="fg full"><label>Razao Social</label>' +
  '<input id="enome" value="'+(e.nome||'')+'"></div></div>' +
  '<div class="fr">' +
  '<div class="fg"><label>CNPJ</label><input id="ecnpj" value="'+(e.cnpj||'')+'" oninput="this.value=maskCNPJ(this.value)"></div>' +
  '<div class="fg"><label>Telefone</label><input id="etel" value="'+(e.telefone||'')+'" oninput="this.value=maskPhone(this.value)"></div></div>' +
  '<div class="fr"><div class="fg full"><label>Endereco</label>' +
  '<input id="eend" value="'+(e.endereco||'')+'"></div></div>' +
  '<div class="fr">' +
  '<div class="fg"><label>Bairro</label><input id="ebairro" value="'+(e.bairro||'')+'"></div>' +
  '<div class="fg"><label>CEP</label><input id="ecep" value="'+(e.cep||'')+'" oninput="this.value=maskCEP(this.value)"></div></div>' +
  '<div class="fr">' +
  '<div class="fg"><label>Cidade</label><input id="ecidade" value="'+(e.cidade||'')+'"></div>' +
  '<div class="fg"><label>UF</label><input id="euf" value="'+(e.uf||'')+'" maxlength="2" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div></div>' +
  '<div class="fr"><div class="fg full"><label>Email</label>' +
  '<input id="eemail" type="email" value="'+(e.email||'')+'"></div></div>' +
  '<div style="margin-top:16px;display:flex;gap:10px">' +
  '<button class="btn bp" onclick="svCfg()">&#128190; Salvar Configuracoes</button>' +
  '</div></div>';
}

function svCfg(){
  var emp = {
    nome:     document.getElementById('enome').value.trim(),
    cnpj:     document.getElementById('ecnpj').value.trim(),
    telefone: document.getElementById('etel').value.trim(),
    endereco: document.getElementById('eend').value.trim(),
    bairro:   document.getElementById('ebairro').value.trim(),
    cep:      document.getElementById('ecep').value.trim(),
    cidade:   document.getElementById('ecidade').value.trim(),
    uf:       document.getElementById('euf').value.toUpperCase(),
    email:    document.getElementById('eemail').value.trim(),
  };
  if(!emp.nome||!emp.cnpj){toast('Informe Razao Social e CNPJ','err');return;}
  DB.empresa = emp;
  sDB();
  fdb.collection('config').doc('empresa').set(emp)
    .then(function(){ toast('Configuracoes salvas com sucesso','ok'); })
    .catch(function(e){ toast('Erro ao salvar: '+e.message,'err'); });
}

function exportRelatorio(){
  var vendidos = DB.veiculos.filter(function(v){return v.status==='vendido';});
  var cols = [
    {label:'Veiculo',fn:function(v){return v.marca+' '+v.modelo+' '+(v.versao||'');}},
    {label:'Placa',key:'placa'},
    {label:'Ano',key:'ano'},
    {label:'Cor',key:'cor'},
    {label:'KM',fn:function(v){return Number(v.km||0).toLocaleString('pt-BR');}},
    {label:'Valor Compra',fn:function(v){return brl(v.valor_compra);}},
    {label:'Valor Venda',fn:function(v){var vd=DB.vendas.find(function(x){return x.veiculo_id==v.id;});return brl(vd?vd.valor:v.preco);}},
    {label:'Cliente',fn:function(v){var vd=DB.vendas.find(function(x){return x.veiculo_id==v.id;});return vd?cNome(vd.cliente_id):'-';}},
    {label:'Data Venda',fn:function(v){var vd=DB.vendas.find(function(x){return x.veiculo_id==v.id;});return vd?fd(vd.data):'-';}},
  ];
  if(confirm('Exportar como PDF?\nCancele para exportar CSV.')) {
    exportPrint('Relatorio de Veiculos Vendidos',cols,vendidos,
      vendidos.length+' veiculos vendidos &bull; Gerado em '+new Date().toLocaleDateString('pt-BR'));
  } else {
    exportCSV(vendidos,'relatorio-vendidos-'+Date.now()+'.csv',cols);
  }
}

</script></body></html>
