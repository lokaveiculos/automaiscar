function sbCollapse(){
  var sb = document.getElementById('sb');
  var ml = document.querySelector('.layout-main');
  if(!sb) return;
  var col = sb.classList.toggle('sb-collapsed');
  localStorage.setItem('sb_col', col ? '1' : '0');
  if(ml) ml.style.marginLeft = col ? 'var(--sidebar-collapsed-w)' : 'var(--sidebar-w)';
  var btn = document.getElementById('sb-toggle-btn');
  if(btn) btn.innerHTML = col ? '&#9656;' : '&#9666;';
}
(function(){
  if(localStorage.getItem('sb_col') === '1'){
    var sb = document.getElementById('sb');
    var ml = document.querySelector('.layout-main');
    var btn = document.getElementById('sb-toggle-btn');
    if(sb) sb.classList.add('sb-collapsed');
    if(ml) ml.style.marginLeft = 'var(--sidebar-collapsed-w)';
    if(btn) btn.innerHTML = '&#9656;';
  }
})();


// ── Theme toggle ─────────────────────────────────────────────
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'light';
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('am_theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  var icon  = document.getElementById('theme-icon');
  var label = document.getElementById('theme-label');
  if(icon)  icon.setAttribute('data-lucide', theme === 'dark' ? 'moon' : 'sun');
  if(label) label.textContent = theme === 'dark' ? 'Tema Escuro' : 'Aparência';
  if(typeof lucide !== 'undefined') lucide.createIcons();
}
(function(){
  var saved = localStorage.getItem('am_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  // Apply after DOM ready
  document.addEventListener('DOMContentLoaded', function(){ updateThemeBtn(saved); });
})();

// ── Sidebar mobile ────────────────────────────────────────────
function tsb() {
  var sb = document.getElementById('sb');
  var ov = document.getElementById('sb-overlay');
  if(!sb) return;
  sb.classList.toggle('open');
  if(ov) ov.classList.toggle('open');
}
function csb() {
  var sb = document.getElementById('sb');
  var ov = document.getElementById('sb-overlay');
  if(sb) sb.classList.remove('open');
  if(ov) ov.classList.remove('open');
}

// ── Lucide init + reinit helper ───────────────────────────────
function renderIcons() {
  if(typeof lucide !== 'undefined') {
    try { lucide.createIcons(); } catch(e) {}
  }
}

// ── Avatar initials ───────────────────────────────────────────
function setAvatar(name) {
  var el = document.getElementById('avatar-initials');
  if(el && name) el.textContent = name.charAt(0).toUpperCase();
}

function applyProfile() {

    });

}


// ── Toast (design system) ─────────────────────────────────────
(function(){
  var stack = document.createElement('div');
  stack.className = 'toast-stack';
  document.body.appendChild(stack);
  
  window.toast = function(msg, type, dur) {
    type = type || 'ok';
    dur  = dur  || 3000;
    var icons = {ok:'check',err:'x-circle',warn:'alert-triangle',info:'info'};
    var el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.innerHTML = '<i data-lucide="' + (icons[type]||'check') + '"></i><span>' + msg + '</span>';
    stack.appendChild(el);
    if(typeof lucide !== 'undefined') lucide.createIcons({nodes:[el]});
    setTimeout(function(){
      el.style.animation = 'toastOut 300ms ease forwards';
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, dur);
  };
})();

function impWin(html_content, titulo){
  var full = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">'
    + '<title>' + (titulo || 'Auto Mais') + '</title>'
    + (typeof CSS_A4 !== 'undefined' ? CSS_A4 : '')
    + '</head><body>' + html_content
    + '<img src="logo-wm.png" style="position:fixed;top:50%;left:50%;'
    + 'transform:translate(-50%,-50%) rotate(-25deg);opacity:.07;'
    + 'pointer-events:none;z-index:0;width:260px" alt="">'
    + '</body></html>';
  var w = null;
  try { w = window.open('', '_blank'); } catch(e) {}
  if (w && !w.closed) {
    w.document.write(full);
    w.document.close();
    w.focus();
    setTimeout(function(){ try{ w.print(); }catch(e){} }, 600);
  } else {
    try {
      var blob = new Blob([full], { type: 'text/html;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'contrato.html';
      a.style.display = 'none';
      document.body.appendChild(a); a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 2000);
      toast('Arquivo baixado — abra e imprima com Ctrl+P', 'ok', 6000);
    } catch(e2) {
      toast('Ative pop-ups no navegador para imprimir', 'warn', 5000);
    }
  }
}

function tgCt(){
  var t=document.getElementById('ctt').value;
  var cli=document.getElementById('f_cli');
  var forn=document.getElementById('f_forn');
  var vex=document.getElementById('f_vex');
  var cons=document.getElementById('f_cons');
  if(cli) cli.style.display=t==='consignacao'?'none':'';
  if(forn) forn.style.display=(t==='consignacao'||t==='compra')?'':'none';
  if(vex) vex.style.display=t==='venda'?'':'none';
  if(cons) cons.style.display=t==='consignacao'?'':'none';
}
function svCt(id){
  var tipo = document.getElementById('ctt').value;
  var num  = document.getElementById('ctn').value.trim();
  var val  = document.getElementById('ctval').value;
  var cliEl  = document.getElementById('ctcli');
  var fornEl = document.getElementById('ctforn');
  var veicEl = document.getElementById('ctv');
  if(!num){toast('Informe o numero do contrato','err');return;}
  if(!val||Number(val)<=0){toast('Informe um valor valido','err');return;}
  if(tipo==='venda'&&(!cliEl||!Number(cliEl.value))){toast('Selecione o cliente','err');return;}
  if((tipo==='compra'||tipo==='consignacao')&&(!fornEl||!Number(fornEl.value))){toast('Selecione o fornecedor/proprietario','err');return;}
  if(!veicEl||!Number(veicEl.value)){toast('Selecione o veiculo','err');return;}
  const obj={id:id||nid(DB.contratos),tipo,numero:num,data:document.getElementById('ctd').value,
    cliente_id:Number(document.getElementById('ctcli')?.value)||'',
    fornecedor_id:Number(document.getElementById('ctforn')?.value)||'',
    veiculo_id:Number(document.getElementById('ctv').value)||'',
    valor:val,status:document.getElementById('cts').value,
    pagamento:document.getElementById('ctpag').value,
    entrada:document.getElementById('ctent')?.value||'',
    financeira:document.getElementById('ctfin')?.value||'',
    num_parcelas:document.getElementById('ctnp')?.value||'',
    valor_parcela:document.getElementById('ctvp')?.value||'',
    prazo:document.getElementById('ctpz')?.value||'90',
    tipo_comissao:document.getElementById('cttc')?.value||'percentual',
    comissao:document.getElementById('ctcom')?.value||'5',
    valor_minimo:document.getElementById('ctvm')?.value||'',
    condicao:document.getElementById('ctcond')?.value||'',
    debitos:document.getElementById('ctdeb')?.value||'Nenhum',
    obs:document.getElementById('ctobs').value};
  if(id)DB.contratos=DB.contratos.map(c=>c.id==id?obj:c);else DB.contratos.push(obj);
  sDB();fsave("contratos",obj);cm();render();
  toast(id?'Contrato atualizado':'Contrato gerado com sucesso','ok');
  toast(id?'Contrato atualizado':'Contrato gerado com sucesso','ok');
}
function impVendaDocsPorCt(ctId){
  const ct=DB.contratos.find(x=>x.id==ctId);
  if(!ct)return;
  const venda=DB.vendas.find(x=>x.contrato_id==ctId);
  if(!venda){toast('Nenhuma venda vinculada a este contrato','warn');return;}
  impTermoChecklist(venda.id);
}

function dlCt(id){
  if(!confirm('Excluir este contrato? Esta acao nao pode ser desfeita.')) return;
  DB.contratos=DB.contratos.filter(function(c){return c.id!=id;});
  sDB();fdel('contratos',id);render();
  toast('Contrato excluido','ok');
}

// ── vizCtDoc — executa a geração dos documentos selecionados ──
function vizCtDoc(id, action){
  var c=DB.contratos.find(function(x){return x.id==id;});if(!c)return;
  function sel(k){var el=document.getElementById('doc_'+k);return el&&el.checked;}
  var partes=[];
  if(c.tipo==='venda'){
    if(sel('cv'))         partes.push(gerarCV_simples(c));
    if(sel('ciencia'))    partes.push(gerarTermoCiencia(c));
    if(sel('checklist'))  partes.push(gerarChecklist_html(c));
    if(sel('uber'))       partes.push(gerarTermoUber(c));
  } else {
    partes.push('<div class="page"><pre style="font-family:monospace;font-size:9pt;white-space:pre-wrap">'+
      (c.tipo==='compra'?gerarCompra(c):gerarConsig(c))+'</pre></div>');
  }
  if(!partes.length){toast('Selecione ao menos um documento','warn');return;}
  var html_full=partes.join('\n');
  if(action==='print'){
    cm();
    impWin(html_full,'Contrato '+c.numero);
  } else {
    cm();
    om(
      '<div class="mt2"><span>&#128196; Preview - Contrato '+c.numero+'</span>'+
      '<button class="btn bg2 bsm" onclick="cm()">&#10005;</button></div>'+
      '<div style="padding:12px;max-height:65vh;overflow-y:auto;background:#f5f5f5;overflow-x:hidden">'+
        '<div style="transform:scale(.6);transform-origin:top left;width:167%;pointer-events:none">'+html_full+'</div>'+
      '</div>'+
      '<div class="mf">'+
        '<button class="btn bg2" onclick="cm()">Fechar</button>'+
        '<button class="btn bp" onclick="vizCtDoc('+id+',\'print\')">&#128438; Imprimir</button>'+
      '</div>',
      true
    );
  }
}
