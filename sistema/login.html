<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto Mais — Acesso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1c1d28;--card:#22233a;--border:#32344a;--border2:#3d3f58;--accent:#f5a623;--ah:#f7b84b;--adim:rgba(245,166,35,.13);--text:#eef0f8;--t2:#888;--t3:#50546a;--err:#ef4444;--ok:#22c55e;--r:8px;--rsm:5px}
html{overflow-x:hidden}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 24px 48px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:32px}
.logo-mark{width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px}
.logo-name{font-size:19px;font-weight:900;letter-spacing:-.3px}
.logo-tag{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
input{background:#0a0a0a;border:1px solid var(--border2);border-radius:var(--rsm);padding:10px 13px;font-size:14px;color:var(--text);outline:none;transition:border .12s;width:100%;font-family:inherit}
input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--adim)}
.btn-login{width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:var(--rsm);font-size:14px;font-weight:900;cursor:pointer;transition:all .12s;margin-top:6px;letter-spacing:-.2px}
.btn-login:hover{background:var(--ah);transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}
.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:var(--err);margin-bottom:12px;display:none;text-align:center}
.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@media(max-width:480px){
  .box{padding:28px 20px;border-radius:10px}
  .logo-name{font-size:17px}
}
</style>
</head>
<body>
<div class="box" id="box">
  <div class="logo">
    <div class="logo-mark">&#128663;</div>
    <div class="logo-name">Auto Mais</div>
    <div class="logo-tag">Comercio e Corretora de Veiculos</div>
  </div>
  <div class="error" id="err">Usuário ou senha incorretos.</div>
  <div class="field">
    <label>Usuário</label>
    <input id="usr" type="text" placeholder="seu usuario" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Senha</label>
    <input id="pwd" type="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" onclick="doLogin()">Entrar no Sistema</button>
</div>

<script>
// Credenciais locais
var USERS = [
  {login:'rogel',      senha:'daniel01',  nome:'Rogel (Admin)',    perfil:'admin'},
  {login:'atendimento',senha:'32252932',  nome:'Atendimento',      perfil:'atendimento'},
];

// Se ja esta logado, redireciona
if(sessionStorage.getItem('am_user')) {
  window.location.href='index.html';
}

document.getElementById('pwd').addEventListener('keydown',function(e){
  if(e.key==='Enter') doLogin();
});
document.getElementById('usr').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('pwd').focus();
});

function doLogin(){
  var u=document.getElementById('usr').value.trim().toLowerCase();
  var p=document.getElementById('pwd').value;
  var found=USERS.find(function(x){return x.login===u && x.senha===p;});
  if(found){
    sessionStorage.setItem('am_user', JSON.stringify({login:found.login,nome:found.nome,perfil:found.perfil}));
    window.location.href='index.html';
  } else {
    var err=document.getElementById('err');
    err.style.display='block';
    var box=document.getElementById('box');
    box.classList.remove('shake');
    void box.offsetWidth;
    box.classList.add('shake');
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}
</script>
</body>
</html>
