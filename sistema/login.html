<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto+ Veículos — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ds.css">
<style>
body{background:var(--bg-app);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse,rgba(224,144,28,.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-modal);padding:40px 36px;width:100%;max-width:420px;box-shadow:var(--shadow-pop);position:relative;z-index:1;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo img{height:48px;width:auto;}
.login-error{background:var(--danger-bg);border:1px solid rgba(220,38,38,.25);border-radius:var(--r);color:var(--danger);font-size:var(--text-sm);font-weight:600;padding:10px 14px;margin-bottom:16px;display:none;text-align:center;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:6px;}
.login-input-wrap{position:relative;}
.login-input-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted);pointer-events:none;}
.login-input{width:100%;height:44px;padding:0 14px 0 38px;border:1px solid var(--border-strong);border-radius:var(--r);background:var(--surface-3);color:var(--text);font-size:var(--text-base);font-family:var(--font-body);transition:border var(--dur-sm),box-shadow var(--dur-sm);}
.login-input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(224,144,28,.15);background:var(--surface);}
.login-btn{width:100%;height:48px;background:var(--brand);color:var(--brand-contrast);border:none;border-radius:var(--r);font-size:var(--text-base);font-weight:700;font-family:var(--font-body);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;transition:background var(--dur-sm),transform var(--dur-sm);}
.login-btn:hover{background:var(--brand-strong);}
.login-btn:active{transform:translateY(1px);}
.login-btn svg{width:18px;height:18px;}
.login-hint{text-align:center;margin-top:20px;font-size:var(--text-sm);color:var(--text-muted);}
.login-theme{position:fixed;top:16px;right:16px;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .35s ease;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

</button>

// Usuários fixos (fallback / admin principal)
var USERS_FIXOS = [
  {login:'rogel', senha:'daniel01', nome:'Rogel (Admin)', perfil:'admin'},
];

function toggleTheme(){
  var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('am_theme',t);
  document.getElementById('login-logo').src=t==='dark'?LOGO_DARK:LOGO_LIGHT;
}
(function(){
  var s=localStorage.getItem('am_theme')||'light';
  document.documentElement.setAttribute('data-theme',s);
  if(document.getElementById('login-logo'))
    document.getElementById('login-logo').src=s==='dark'?LOGO_DARK:LOGO_LIGHT;
})();

(function(){try{var r=localStorage.getItem('am_user');if(r){var u=JSON.parse(r);if(u&&(!u._ts||Date.now()-u._ts<8*60*60*1000))window.location.href='index.html';}}catch(e){}})();

document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('usr').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('pwd').focus();});

function setLoginBtn(loading){
  var btn=document.getElementById('login-btn');
  if(!btn) return;
  btn.disabled=loading;
  btn.innerHTML=loading
    ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .8s linear infinite"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg> Verificando...'
    :'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Entrar no Sistema';
}

function showError(){
  var err=document.getElementById('login-err');
  err.style.display='block';
  var card=document.getElementById('card');
  card.classList.remove('shake');void card.offsetWidth;card.classList.add('shake');
  document.getElementById('pwd').value='';
  document.getElementById('pwd').focus();
}

function doLoginSuccess(user){
  localStorage.setItem('am_user',JSON.stringify({login:user.login,nome:user.nome,perfil:user.perfil,_ts:Date.now()}));
  window.location.href='index.html';
}

async function doLogin(){
  var u=document.getElementById('usr').value.trim().toLowerCase();
  var p=document.getElementById('pwd').value;
  if(!u||!p){ showError(); return; }

  setLoginBtn(true);

  // 1. Verificar usuários fixos
  var found=USERS_FIXOS.find(function(x){return x.login===u&&x.senha===p;});

  // 2. Verificar cache localStorage
  if(!found){
    try{
      var raw=localStorage.getItem('automais_v3');
      if(raw){
        var db=JSON.parse(raw);
        var dbUsers=db.usuarios||[];
        found=dbUsers.find(function(x){
          return x.login===u && x.senha===p && x.status!=='inativo';
        });
      }
    }catch(e){}
  }

  // 3. Verificar no Firestore (para novos dispositivos sem cache)
  if(!found){
    try{
      var fdb=firebase.firestore();
      var snap=await fdb.collection('usuarios')
        .where('login','==',u)
        .where('status','==','ativo')
        .get();
      if(!snap.empty){
        snap.docs.forEach(function(doc){
          var d=doc.data();
          if(!found && d.senha===p) found=d;
        });
      }
    }catch(e){
      console.warn('[login] Firestore indisponível:',e.message);
    }
  }

  setLoginBtn(false);

  if(found){
    doLoginSuccess(found);
  }else{
    showError();
  }
}
