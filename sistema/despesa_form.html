<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto Mais - Lancamento de Despesa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1c1d28;--card:#22233a;--border:#32344a;--border2:#3d3f58;--accent:#f5a623;--ah:#f7b84b;--adim:rgba(245,166,35,.13);--text:#eef0f8;--t2:#8890a8;--t3:#50546a;--ok:#22c55e;--err:#ef4444;--r:8px;--rsm:5px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
.box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;width:100%;max-width:560px}
.logo-top{text-align:center;margin-bottom:20px}
.logo-top img{max-width:140px}
.title{font-size:17px;font-weight:900;margin-bottom:20px;color:var(--text)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
label{font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{background:#0d0e1a;border:1px solid var(--border2);border-radius:var(--rsm);padding:9px 11px;font-size:13px;color:var(--text);outline:none;transition:border .12s;width:100%;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--adim)}
select option{background:#0d0e1a}
textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--rsm);border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .12s}
.bp{background:var(--accent);color:#000;width:100%;justify-content:center;font-size:14px;padding:12px;margin-top:6px}
.bp:hover{background:var(--ah)}
.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:var(--rsm);padding:14px;text-align:center;color:var(--ok);font-weight:700;display:none;margin-top:14px}
.link-back{text-align:center;margin-top:14px;font-size:12px;color:var(--t3)}
.link-back a{color:var(--accent);text-decoration:none}
@media(max-width:640px){
  html,body{overflow-x:hidden}
  .box{padding:20px 16px;border-radius:10px}
  .fr{grid-template-columns:1fr}
  .fr .fg.full{grid-column:1}
  input,select,textarea{font-size:16px}
}
</style>
</head>

function nid(a){return a.length?Math.max(...a.map(x=>x.id))+1:1;}

// Data padrão hoje
document.getElementById('dd').value = new Date().toISOString().split('T')[0];

function autoPlaca(){
  var sel = document.getElementById('dveic');
  var placa = sel.value;
  var v = DB.veiculos.find(function(x){return x.placa===placa;});
  document.getElementById('dplaca').value = placa;
  if(v && v.tipo_est==='consignado'){
    var f = DB.fornecedores.find(function(x){return x.id==v.proprietario_id;});
    if(f) document.getElementById('dprop').value = f.nome;
  }
}

function salvar(){
  var data  = document.getElementById('dd').value;
  var valor = document.getElementById('dval').value;
  var forn  = document.getElementById('dforn').value.trim();
  if(!data||!valor||!forn){alert('Preencha Data, Valor e Fornecedor.');return;}
  if(!DB.despesas) DB.despesas = [];
  var obj = {
    id:           nid(DB.despesas),
    data:         data,
    fornecedor:   forn,
    proprietario: document.getElementById('dprop').value,
    veiculo:      document.getElementById('dveic').value,
    placa:        document.getElementById('dplaca').value.toUpperCase(),
    valor:        valor,
    descricao:    document.getElementById('ddesc').value,
  };
  DB.despesas.push(obj);
  sDB(); fsave('despesas', obj);
  document.getElementById('ok').style.display='block';
  // Limpar campos
  document.getElementById('dveic').value='';
  document.getElementById('dplaca').value='';
  document.getElementById('dprop').value='';
  document.getElementById('dforn').value='';
  document.getElementById('dval').value='';
  document.getElementById('ddesc').value='';
  document.getElementById('dd').value = new Date().toISOString().split('T')[0];
  setTimeout(function(){document.getElementById('ok').style.display='none';},3000);
}
</script>
