// ── Theme toggle ─────────────────────────────────────────────
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'light';
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('am_theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  var icon  = document.getElementById('theme-icon');
  var label = document.getElementById('theme-label');
  if(icon)  icon.setAttribute('data-lucide', theme === 'dark' ? 'moon' : 'sun');
  if(label) label.textContent = theme === 'dark' ? 'Tema Escuro' : 'Aparência';
  if(typeof lucide !== 'undefined') lucide.createIcons();
}
(function(){
  var saved = localStorage.getItem('am_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  // Apply after DOM ready
  document.addEventListener('DOMContentLoaded', function(){ updateThemeBtn(saved); });
})();

// ── Sidebar mobile ────────────────────────────────────────────
function tsb() {
  var sb = document.getElementById('sb');
  var ov = document.getElementById('sb-overlay');
  if(!sb) return;
  sb.classList.toggle('open');
  if(ov) ov.classList.toggle('open');
}
function csb() {
  var sb = document.getElementById('sb');
  var ov = document.getElementById('sb-overlay');
  if(sb) sb.classList.remove('open');
  if(ov) ov.classList.remove('open');
}

// ── Lucide init + reinit helper ───────────────────────────────
function renderIcons() {
  if(typeof lucide !== 'undefined') {
    try { lucide.createIcons(); } catch(e) {}
  }
}

// ── Avatar initials ───────────────────────────────────────────
function setAvatar(name) {
  var el = document.getElementById('avatar-initials');
  if(el && name) el.textContent = name.charAt(0).toUpperCase();
}

// ── Admin nav ─────────────────────────────────────────────────
function applyProfile() {
  if(!isAdmin()) {
    document.querySelectorAll('[data-admin-only]').forEach(function(el){
      el.style.display = 'none';
    });
  }
}


// ── Toast (design system) ─────────────────────────────────────
(function(){
  var stack = document.createElement('div');
  stack.className = 'toast-stack';
  document.body.appendChild(stack);
  
  window.toast = window.toast_impl = function(msg, type, dur) {
    type = type || 'ok';
    dur  = dur  || 3000;
    var icons = {ok:'check',err:'x-circle',warn:'alert-triangle',info:'info'};
    var el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.innerHTML = '<i data-lucide="' + (icons[type]||'check') + '"></i><span>' + msg + '</span>';
    stack.appendChild(el);
    if(typeof lucide !== 'undefined') lucide.createIcons({nodes:[el]});
    setTimeout(function(){
      el.style.animation = 'toastOut 300ms ease forwards';
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, dur);
  };
})();

function brl(v){return Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(d){if(!d)return'-';try{return new Date(d+'T12:00').toLocaleDateString('pt-BR');}catch(e){return d;}}
function nid(a){return a.length?Math.max(...a.map(x=>x.id))+1:1;}
function ini(n){return(n||'?').split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();}

// ── Busca Global (Bloco 12) ──────────────────────────────────
function buscaGlobal(q){
  var el = document.getElementById('buscaResultados');
  if(!el) return;
  if(!q||q.length<2){el.innerHTML='';return;}
  var q2=q.toLowerCase().trim();

  function hl(txt2){
    if(!txt2)return'-';
    return String(txt2).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark style="background:rgba(245,166,35,.3);border-radius:2px">$1</mark>');
  }
  function card(ico,label,items,link){
    if(!items.length)return'';
    return '<div style="margin-bottom:12px">'+
      '<div style="font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">'+ico+' '+label+' ('+items.length+')</div>'+
      items.slice(0,5).map(function(i){return i;}).join('')+
      (items.length>5?'<div style="font-size:11px;color:var(--t3);margin-top:4px">...e mais '+(items.length-5)+'</div>':'')+
      '</div>';
  }
  function row(txt2,sub,href){
    return '<a href="'+(href||'#')+'" style="display:flex;flex-direction:column;padding:7px 10px;border-radius:5px;background:var(--card2);margin-bottom:4px;cursor:pointer;text-decoration:none;color:inherit">'+
      '<span style="font-size:13px;font-weight:600">'+txt2+'</span>'+
      (sub?'<span style="font-size:11px;color:var(--t2)">'+sub+'</span>':'')+
      '</a>';
  }

  // Veículos
  var rV = DB.veiculos.filter(function(v){
    return v.placa.toLowerCase().includes(q2)||v.marca.toLowerCase().includes(q2)||
           v.modelo.toLowerCase().includes(q2)||(v.chassi||'').toLowerCase().includes(q2);
  });
  // Clientes
  var rC = DB.clientes.filter(function(c){
    return c.nome.toLowerCase().includes(q2)||c.cpf.includes(q2)||(c.telefone||'').includes(q2);
  });
  // Contratos
  var rCt = DB.contratos.filter(function(c){
    return c.numero.toLowerCase().includes(q2)||(cNome(c.cliente_id)||'').toLowerCase().includes(q2)||(fNome(c.fornecedor_id)||'').toLowerCase().includes(q2);
  });
  // Fornecedores
  var rF = DB.fornecedores.filter(function(f){
    return f.nome.toLowerCase().includes(q2)||f.cpf.includes(q2);
  });
  // Manutenções
  var rM = DB.manutencoes.filter(function(m){
    return vNome(m.veiculo_id).toLowerCase().includes(q2)||(m.tipo||'').toLowerCase().includes(q2)||(m.oficina||'').toLowerCase().includes(q2);
  });
  // Despesas
  var rD = (DB.despesas||[]).filter(function(d){
    return (d.placa||'').toLowerCase().includes(q2)||(d.fornecedor||'').toLowerCase().includes(q2)||(d.descricao||'').toLowerCase().includes(q2);
  });

  var totalRes = rV.length+rC.length+rCt.length+rF.length+rM.length+rD.length;
  if(totalRes===0){
    el.innerHTML='<div style="font-size:13px;color:var(--t3);padding:8px">Nenhum resultado para <b>'+q+'</b></div>';
    return;
  }

  var html = '<div style="font-size:12px;color:var(--t3);margin-bottom:10px">'+totalRes+' resultado(s) para <b style="color:var(--accent)">'+q+'</b></div>';

  html += card('&#128664;','Veiculos',rV.map(function(v){
    return row(hl(v.marca+' '+v.modelo+' '+(v.versao||'')),hl(v.placa)+' &bull; '+v.ano+' &bull; '+v.status,'veiculos.html');
  }),'veiculos.html');

  html += card('&#128101;','Clientes',rC.map(function(c){
    return row(hl(c.nome),hl(c.cpf)+' &bull; '+hl(c.telefone),'cadastros.html');
  }),'cadastros.html');

  html += card('&#128196;','Contratos',rCt.map(function(c){
    return row(hl(c.numero),( cNome(c.cliente_id)||fNome(c.fornecedor_id)||'-')+' &bull; R$ '+brl(c.valor),'contratos.html');
  }),'contratos.html');

  html += card('&#127970;','Fornecedores',rF.map(function(f){
    return row(hl(f.nome),hl(f.cpf),'cadastros.html#forn');
  }),'cadastros.html');

  html += card('&#128295;','Manutencoes',rM.map(function(m){
    return row(vNome(m.veiculo_id),hl(m.tipo)+' &bull; R$ '+brl(m.valor)+' &bull; '+fd(m.data),'gestao.html');
  }),'gestao.html');

  html += card('&#128181;','Despesas',rD.map(function(d){
    return row(hl(d.fornecedor||'-'),hl(d.placa||'-')+' &bull; R$ '+brl(d.valor)+' &bull; '+fd(d.data),'despesas.html');
  }),'despesas.html');

  el.innerHTML = html;
}
